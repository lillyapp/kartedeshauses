name: Update product links

on:
  workflow_dispatch:
    inputs:
      productlinks_block:
        description: "Paste the helper output: either the full ## Produktlinks block or only the JSON object."
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-data-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Update Produktlinks block in data.md
        env:
          PRODUCTLINKS_BLOCK: ${{ inputs.productlinks_block }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          data_path = Path("data.md")
          if not data_path.exists():
            raise SystemExit("data.md was not found in the repository root.")

          raw_input = os.environ["PRODUCTLINKS_BLOCK"].strip()
          if not raw_input:
            raise SystemExit("No product links were provided.")

          fenced = re.search(r"```json\s*([\s\S]*?)```", raw_input, re.IGNORECASE)
          json_text = fenced.group(1).strip() if fenced else raw_input
          links = json.loads(json_text)

          if not isinstance(links, dict):
            raise SystemExit("Product links must be a JSON object.")

          cleaned = {
            str(key): str(value).strip()
            for key, value in sorted(links.items())
            if str(key).strip() and str(value).strip().startswith(("http://", "https://"))
          }

          productlinks_block = (
            "## Produktlinks\n"
            "```json\n"
            f"{json.dumps(cleaned, ensure_ascii=False, indent=2)}\n"
            "```\n"
          )

          data = data_path.read_text(encoding="utf-8").rstrip()
          pattern = r"\n## Produktlinks\s*```json\s*[\s\S]*?```\s*$"
          if re.search(pattern, data, re.IGNORECASE):
            data = re.sub(pattern, "\n\n" + productlinks_block, data, flags=re.IGNORECASE)
          else:
            data = data + "\n\n" + productlinks_block

          data_path.write_text(data.rstrip() + "\n", encoding="utf-8")
          PY

      - name: Commit and push data.md
        run: |
          if git diff --quiet -- data.md; then
            echo "No changes in data.md."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.md
          git commit -m "Update product links"
          git push
