<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KARTE DES HAUSES</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --muted: #6b6b6b;
      --line: #000000;
      --success: #138a36;
      --panel-bg: #ffffff;
      --page-max: 1200px;
      --page-gutter: 24px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      padding: 32px var(--page-gutter) 40px;
    }

    main {
      position: relative;
      max-width: var(--page-max);
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 18px;
      letter-spacing: 0.02em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: baseline;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.4;
    }

    .meta strong {
      font-weight: 700;
    }

    .random-row {
      display: none;
    }

    .controls {
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .week-plan {
      margin: 0 0 18px;
      max-width: 100%;
      border-left: 1px solid transparent;
      border-right: 1px solid transparent;
    }

    .week-plan[hidden] {
      display: none;
    }

    .week-plan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
      padding-right: 0;
    }

    .section-heading {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--fg);
    }

    .week-plan-scroll {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      box-shadow: none;
    }

    .week-plan-scroll[hidden] {
      display: none;
    }

    .week-plan-scroll:hover,
    .week-plan-scroll:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .week-plan-scroll svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .week-plan-viewport {
      max-width: 100%;
      overflow-x: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .week-plan-viewport::-webkit-scrollbar {
      display: none;
    }

    .week-plan-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      align-items: start;
      gap: 10px;
      min-width: 800px;
    }

    .week-plan-column {
      padding: 12px;
      border-radius: 10px;
      background: #f1f1f1;
      border: 1px solid #f1f1f1;
    }

    .week-plan-column[data-drag-over="true"] {
      background: #eaf8ee;
      border-color: var(--success);
    }

    .week-plan-title {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--fg);
    }

    .week-plan-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 10px;
      gap: 6px;
    }

    .week-plan-title-row .week-plan-title {
      margin: 0;
    }

    .week-plan-kcal-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .week-plan-extras {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 8px 0 0;
      padding-top: 8px;
      border-top: 1px dashed rgba(0,0,0,0.15);
    }

    .week-plan-extras-label {
      font-size: 11px;
      color: var(--muted);
      flex: 1;
      min-width: 0;
    }

    .week-plan-wheat-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      box-shadow: none;
      flex: none;
    }

    .week-plan-wheat-btn:hover,
    .week-plan-wheat-btn:focus-visible {
      background: rgba(0,0,0,0.07);
      color: var(--fg);
    }

    .week-plan-wheat-btn[data-active="true"] {
      background: #fff8e7;
      color: #b8860b;
    }

    .week-plan-wheat-btn svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.8;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .week-plan-extra-input {
      width: 52px;
      padding: 3px 5px;
      border: 1px solid rgba(0,0,0,0.18);
      border-radius: 5px;
      font: inherit;
      font-size: 11px;
      text-align: center;
      background: #fff;
      color: var(--fg);
    }

    .week-plan-extra-input:focus {
      outline: 2px solid var(--fg);
      outline-offset: 1px;
    }

    .week-plan-items {
      display: grid;
      gap: 7px;
    }

    .week-plan-item {
      width: 100%;
      padding: 8px 9px;
      min-height: 0;
      border: 0;
      border-radius: 7px;
      background: #fff;
      text-align: left;
      font-size: 13px;
      line-height: 1.25;
      cursor: grab;
      box-shadow: none;
    }

    .week-plan-item:active {
      cursor: grabbing;
    }

    .top-actions {
      position: fixed;
      top: 18px;
      right: max(var(--page-gutter), calc((100vw - var(--page-max)) / 2));
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(360px, calc(100vw - (var(--page-gutter) * 2)));
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 42px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      text-decoration: none;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.65) inset;
    }

    .icon-button[data-active="true"] {
      background: #eaf8ee;
      border-color: var(--success);
      color: var(--success);
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.9;
    }

    #selectionCartButton,
    #productLinkHelperButton,
    .top-actions > a.icon-button {
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
    }

    #productLinkHelperButton[data-invalid="true"] {
      color: #c62828;
      animation: helper-alert 900ms ease-in-out infinite;
    }

    @keyframes helper-alert {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.35;
        transform: scale(1.08);
      }
    }

    #summaryButton {
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
      min-width: 0;
      min-height: 0;
      width: 28px;
      height: 28px;
      border-radius: 999px;
    }

    #summaryButton:hover,
    #summaryButton:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .basket-prompt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 16px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: #f7f7f3;
      font-size: 13px;
      line-height: 1.4;
      max-width: 100%;
    }

    .basket-prompt[hidden] {
      display: none;
    }

    .basket-prompt strong {
      font-weight: 700;
    }

    .basket-prompt > div:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .basket-prompt-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: none;
    }

    .basket-prompt button {
      border: 0;
      padding: 7px 10px;
      min-height: 32px;
      background: #fff;
    }

    .basket-prompt button[data-action="confirm"] {
      background: #eaf8ee;
      color: var(--success);
    }

    .product-helper {
      border: 1px solid var(--line);
      background: #fff;
      padding: 14px;
      margin: 0 0 18px;
      font-size: 13px;
      line-height: 1.45;
    }

    .product-helper[hidden] {
      display: none;
    }

    .product-helper-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
    }

    .product-helper-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .product-helper-meta {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .product-helper-close {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      border-radius: 999px;
    }

    .product-helper-close:hover,
    .product-helper-close:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .product-helper-current {
      display: grid;
      gap: 8px;
      margin: 0 0 12px;
    }

    .product-helper-current strong {
      font-weight: 700;
    }

    .product-helper-input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
    }

    .product-helper-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 12px;
    }

    .product-helper-actions button[data-primary="true"] {
      background: #eaf8ee;
      color: var(--success);
      border-color: var(--success);
    }

    .product-helper-export {
      width: 100%;
      min-height: 130px;
      border: 1px solid rgba(0, 0, 0, 0.22);
      background: #f7f7f3;
      padding: 10px;
      font: inherit;
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
    }

    .product-helper-status {
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }

    .icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--fg);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .icon-badge[data-animate="add"] {
      animation: badge-pop-add 520ms ease-out;
    }

    .icon-badge[data-animate="remove"] {
      animation: badge-pop-remove 520ms ease-out;
    }

    @keyframes badge-pop-add {
      0% {
        transform: scale(1);
        background: var(--fg);
      }
      35% {
        transform: scale(1.35);
        background: var(--success);
      }
      100% {
        transform: scale(1);
        background: var(--fg);
      }
    }

    @keyframes badge-pop-remove {
      0% {
        transform: scale(1);
        background: var(--fg);
      }
      35% {
        transform: scale(1.35);
        background: #c62828;
      }
      100% {
        transform: scale(1);
        background: var(--fg);
      }
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      padding: 9px 14px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #f5f5f5;
    }

    button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      user-select: none;
    }

    .toggle input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #000;
    }

    .recipe-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      color: var(--fg);
      text-decoration: none;
      line-height: 1;
    }

    .recipe-link:hover {
      background: #f5f5f5;
    }

    .recipe-link svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.9;
    }

    .recipe-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .recipe-text-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid transparent;
      text-decoration: none;
      line-height: 1.2;
    }

    .recipe-text-link:hover,
    .recipe-text-link:focus-visible {
      border-color: var(--line);
      background: #f5f5f5;
    }

    .recipe-text-link svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.9;
      flex: none;
    }

    .recipe-header {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .filter-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      box-shadow: none;
    }

    .filter-button:hover,
    .filter-button:focus-visible,
    .filter-button[data-active="true"] {
      background: rgba(0, 0, 0, 0.06);
    }

    .filter-button svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    .filter-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 15;
      min-width: 210px;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--bg);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
    }

    .filter-popover[hidden] {
      display: none;
    }

    .filter-popover .toggle {
      display: flex;
      margin: 0 0 8px;
      white-space: normal;
    }

    .filter-popover .toggle:last-child {
      margin-bottom: 0;
    }

    .cart-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      color: var(--fg);
      padding: 0;
      border-radius: 999px;
      box-shadow: none;
    }

    .cart-toggle:hover,
    .cart-toggle:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .cart-toggle[data-active="true"] {
      background: #eaf8ee;
      color: var(--success);
    }

    .cart-toggle svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .summary-panel {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-bg);
      padding: 16px;
      margin: 0 0 18px;
    }

    .summary-panel[hidden] {
      display: none;
    }

    .summary-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .summary-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .summary-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 14px;
    }

    .summary-tools[hidden] {
      display: none;
    }

    .summary-filter-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      box-shadow: none;
    }

    .summary-filter-button:hover,
    .summary-filter-button:focus-visible,
    .summary-filter-button[data-active="true"] {
      background: rgba(0, 0, 0, 0.06);
    }

    .summary-filter-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
    }

    .summary-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .summary-toggle input {
      margin: 0;
      accent-color: var(--success);
    }

    .summary-portion {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .summary-portion input {
      width: 72px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 10px;
      font: inherit;
    }

    .summary-list {
      display: grid;
      gap: 12px;
    }

    .summary-card {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .summary-card:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .summary-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .summary-card ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.55;
    }

    .summary-ingredients {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .summary-ingredients li {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dotted rgba(0, 0, 0, 0.18);
      padding-bottom: 6px;
    }

    .summary-ingredients li[data-purchased="true"],
    .summary-ingredients li[data-excluded="true"],
    .summary-ingredients li[data-basket="true"],
    .summary-aggregate li[data-purchased="true"] {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .summary-ingredients-item {
      min-width: 0;
      flex: 1;
    }

    .summary-aggregate {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .summary-aggregate li {
      border-bottom: 1px dotted rgba(0, 0, 0, 0.18);
      padding-bottom: 6px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .summary-aggregate li[data-basket="true"] {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .summary-aggregate-item {
      min-width: 0;
      flex: 1;
    }

    .ingredient-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: none;
    }

    .ingredient-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      box-shadow: none;
    }

    .ingredient-action:hover,
    .ingredient-action:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .ingredient-action[data-active="true"] {
      color: var(--success);
    }

    .ingredient-action[data-available="false"] {
      color: var(--muted);
    }

    .ingredient-action svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ingredient-action[data-loading="true"] svg {
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .ingredient-main {
      flex: 1;
      min-width: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      font: inherit;
      line-height: inherit;
    }

    .ingredient-main:hover,
    .ingredient-main:focus-visible {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .summary-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .table-wrap {
      overflow-x: auto;
      max-width: 100%;
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      -webkit-overflow-scrolling: touch;
    }

    .table-heading {
      margin: 0 0 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      font-size: 13px;
      padding: 10px;
      border-bottom: 1px solid var(--line);

    function splitMarkdownRow(line) {
      return line
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => cell.trim());
    }

    function isSeparatorRow(line) {
      return /^\s*\|?[:\- ]+\|[:\-\| ]+\s*$/.test(line) && line.includes("-");
    }

    function parseMarkdownTable(markdown) {
      const lines = markdown
        .split(/\r?\n/)
        .map((line) => line.trimEnd())
        .filter((line) => line.trim().length > 0);

      const tableStart = lines.findIndex((line, index) => {
        const next = lines[index + 1];
        return line.includes("|") && next && isSeparatorRow(next);
      });

      if (tableStart === -1) {
        throw new Error("Keine Markdown-Tabelle gefunden.");
      }

      const headers = splitMarkdownRow(lines[tableStart]);
      const rows = [];

      for (let i = tableStart + 2; i < lines.length; i += 1) {
        const line = lines[i];
        if (!line.includes("|")) break;
        rows.push(splitMarkdownRow(line));
      }

      return { headers, rows };
    }

    function parseProductLinksFromMarkdown(markdown) {

      if (!match) {

      }

      try {
        const parsed = JSON.parse(match[1]);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (error) {
        return {};
      }
    }

    }

    function extractCellLink(cell) {

      if (markdownLink) {

        };
      }

      const plainUrl = cell.match(/https?:\/\/[^\s)]+/);
      if (plainUrl) {
        return {
          text: cell,
          href: plainUrl[0]
        };
      }

      return null;
    }

    function normalizeIngredientName(name) {
      const cleaned = name
        .replace(/\s*\(.*?\)\s*/g, " ")
        .replace(/\b(zum servieren|zum garnieren|zum bestäuben|zum anbraten|optional)\b/gi, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();

      if (/\brote?\s+zwiebel\b|\bzwiebel\s+rot\b/.test(cleaned)) {
        return "rote zwiebel";
      }
      if (/\brote?\s+paprika\b|\bpaprika\s+rot\b|\bgegrillte paprika\b/.test(cleaned)) {
        return "rote paprika";
      }
      if (/\bgelbe?\s+paprika\b|\bpaprika\s+gelb\b/.test(cleaned)) {
        return "gelbe paprika";
      }
      if (/\bbutter\b/.test(cleaned)) {
        return "butter";
      }
      if (/\bspinat\s+gefroren\b/.test(cleaned)) {
        return "spinat";
      }
      if (/\bbrötchen\s+vom vortag\b/.test(cleaned)) {
        return "brötchen";
      }
      if (/\blimette\s+abrieb und saft\b/.test(cleaned)) {
        return "limette";
      }
      if (/\bcocktailtomate\b|\bkirschtomate\b/.test(cleaned)) {
        return "kirschtomate";
      }
      if (/\bhähnchenbrust\b/.test(cleaned)) {
        return "hähnchenbrustfilet";
      }

      if (INGREDIENT_ALIASES.has(cleaned)) {
        return INGREDIENT_ALIASES.get(cleaned);
      }

      return cleaned
        .replace(/^zehen\s+knoblauch$/, "knoblauch")
        .replace(/^zehe\s+knoblauch$/, "knoblauch")
        .replace(/\s+käse$/, "")

        .replace(/\s+scheiben$/, " scheibe")
        .replace(/\s+zweige$/, " zweig")
        .replace(/\s+stangen$/, " stange");
    }

      summaryCount.dataset.animate = "";
      window.requestAnimationFrame(() => {
        summaryCount.dataset.animate = type;
      });
    }

    function setCartState(rowIndex, active) {
      const key = getRecipeKey(rowIndex);
      const wasActive = Boolean(cartState[key]);
      if (active) {
        cartState[key] = true;
      } else {
        delete cartState[key];
      }
      saveCartState();
      if (wasActive !== active) {
        animateCartCount(active ? "add" : "remove");
      }
      renderCurrentTable();
      renderSummary();
      renderWeekPlan();
    }

    function toggleCart(rowIndex) {
      setCartState(rowIndex, !isInCart(rowIndex));
    }

    function addSelectionToCart() {
      selectedRowIndexes.forEach((rowIndex) => {
        setCartState(rowIndex, true);
      });
      saveCartState();
      renderCurrentTable();
      renderSummary();
      renderWeekPlan();
    }

    function hasPlanningData() {
      return Object.keys(cartState).length > 0
        || Object.keys(weekPlanState).length > 0
        || Object.keys(purchasedState).length > 0
        || Object.keys(excludedState).length > 0;
    }

    function clearPlanningData() {
      cartState = {};
      weekPlanState = {};
      purchasedState = {};
      excludedState = {};
      saveCartState();
      saveWeekPlanState();
      saveBooleanMap(PURCHASED_STORAGE_KEY, purchasedState);
      saveBooleanMap(EXCLUDED_STORAGE_KEY, excludedState);
      clearPendingPrompt();
    }

    function runMagicSelection({ overwrite = false } = {}) {
      if (selectedRowIndexes.length === 0) {
        return;
      }

      if (hasPlanningData()) {
        if (!overwrite) {
          setPendingOverwritePrompt();
          return;
        }

        clearPlanningData();
      }

      refreshSelection();
      addSelectionToCart();
      portionScale = 5;
      portionScaleInput.value = String(portionScale);
      savePortionScale();
      setSummaryVisibility(true);
    }

    function getCartRecipeEntries() {
      return Object.entries(cartState)
        .filter(([, active]) => active)
        .map(([rowIndex]) => {
          const index = Number(rowIndex);
          const row = allRows[index];
          return row ? { row, rowIndex: index } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.rowIndex - b.rowIndex);
    }

    function syncWeekPlanState(entries) {
      const activeKeys = new Set(entries.map(({ rowIndex }) => String(rowIndex)));
      Object.keys(weekPlanState).forEach((key) => {
        if (!activeKeys.has(key)) {
          delete weekPlanState[key];
        }
      });

      entries.forEach(({ rowIndex }, index) => {
        const key = String(rowIndex);
        if (!Number.isInteger(weekPlanState[key]) || weekPlanState[key] < 0 || weekPlanState[key] > 4) {
          weekPlanState[key] = index % 5;
        }
      });

      saveWeekPlanState();
    }

    function renderWeekPlan() {
      const entries = getCartRecipeEntries();
      if (entries.length < 5) {
        weekPlan.hidden = true;
        weekPlanGrid.innerHTML = "";
        return;
      }

      syncWeekPlanState(entries);
      const titles = ["TAG 1 · 2", "TAG 3 · 4", "TAG 5 · 6", "TAG 7 · 8", "TAG 9 · 10"];
      const kcalIndex = allHeaders.indexOf("kcal pro Portion");
      weekPlan.hidden = false;

      weekPlanGrid.innerHTML = titles.map((title, slot) => {
        const slotEntries = entries.filter(({ rowIndex }) => weekPlanState[String(rowIndex)] === slot);

        // Sum kcal from recipes in this slot
        let kcalSum = 0;
        let hasKcal = false;
        if (kcalIndex !== -1) {
          slotEntries.forEach(({ row }) => {
            const raw = (row[kcalIndex] || "").replace(/[^\d]/g, "");
            const val = Number(raw);
            if (val > 0) {
              kcalSum += val;
              hasKcal = true;
            }
          });
        }

        // Add extra kcal if active for this slot (×2 for Frühstück + Abendessen)
        const extra = slotExtraKcal[slot] || { active: false, kcal: 400 };
        const extraKcal = extra.active ? (Number(extra.kcal) || 0) * 2 : 0;
        const totalKcal = kcalSum + extraKcal;
        const kcalLabel = (hasKcal || extra.active) ? `${totalKcal} kcal` : "";

        return `
          <section class="week-plan-column" data-slot="${slot}">
            <div class="week-plan-title-row">
              <h2 class="week-plan-title">${title}</h2>
              ${kcalLabel ? `<span class="week-plan-kcal-badge">${kcalLabel}</span>` : ""}
            </div>
            <div class="week-plan-items">
              ${slotEntries.map(({ row, rowIndex }) => `
                <button class="week-plan-item" type="button" draggable="true" data-row-index="${rowIndex}">
                  ${row[0]}
                </button>
              `).join("")}
            </div>
            <div class="week-plan-extras">
              <button
                type="button"
                class="week-plan-wheat-btn"
                data-slot="${slot}"
                data-active="${extra.active ? "true" : "false"}"
                title="Frühstück &amp; Abendessen einrechnen (je 1×)"
                aria-label="Frühstück &amp; Abendessen einrechnen"
              ><i data-lucide="wheat" aria-hidden="true"></i></button>
              <span class="week-plan-extras-label">Fr. &amp; Ab.</span>
              <input
                type="number"
                class="week-plan-extra-input"
                data-slot="${slot}"
                value="${extra.kcal || 400}"
                min="0"
                step="10"
                title="Kcal pro Mahlzeit (wird ×2 gerechnet)"
                aria-label="Kcal für Frühstück &amp; Abendessen"
              >
              <span style="font-size:11px;color:var(--muted)">kcal</span>
            </div>
          </section>
        `;
      }).join("");

      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
      updateWeekPlanScrollButton();
    }

    function updateWeekPlanScrollButton() {
      if (weekPlan.hidden) {
        weekPlanScrollButton.hidden = true;
        return;
      }

      window.requestAnimationFrame(() => {
        weekPlanScrollButton.hidden = weekPlanViewport.scrollWidth <= weekPlanViewport.clientWidth + 1;
      });
    }

    function scrollWeekPlanToOppositeSide() {
      const maxScroll = Math.max(0, weekPlanViewport.scrollWidth - weekPlanViewport.clientWidth);
      const isNearEnd = weekPlanViewport.scrollLeft >= maxScroll - 8;
      weekPlanViewport.scrollTo({
        left: isNearEnd ? 0 : maxScroll,
        behavior: "smooth"
      });
    }

    function autoScrollWeekPlan(event) {
      if (window.matchMedia("(max-width: 700px)").matches) {
        return;
      }

      const bounds = weekPlanViewport.getBoundingClientRect();
      const edge = 72;
      if (event.clientX < bounds.left + edge) {
        weekPlanViewport.scrollLeft -= 24;
      } else if (event.clientX > bounds.right - edge) {
        weekPlanViewport.scrollLeft += 24;
      }
    }

    function setIngredientPurchasedFromKey(key, active) {
      setPurchased(key, active);
      if (isSummaryOpen) {
        renderSummary();
      }
    }

    function renderPrompt() {
      if (!pendingPrompt) {
        basketPrompt.hidden = true;

      }

      basketPrompt.hidden = false;
      basketPrompt.innerHTML = `

    function setPendingBasketItem(item) {

    function openReweSearchForItem(itemName, globalKey = "") {
      const productUrl = globalKey ? productLinks[globalKey] : "";
      if (productUrl) {
        window.open(productUrl, "_blank", "noopener,noreferrer");
        return;
      }

      const normalized = itemName.trim();
      const term = /^ja!/i.test(normalized) ? normalized : `JA! ${normalized}`;
      window.open(`${REWE_SEARCH_BASE_URL}${encodeURIComponent(term)}`, "_blank", "noopener,noreferrer");
    }

    function parseFractionToken(token) {
      const FRACTIONS = {
        "1/2": 0.5,
        "1/4": 0.25,
        "3/4": 0.75,
        "1/3": 1 / 3,
        "2/3": 2 / 3,
        "1/8": 0.125,
        "3/8": 0.375,
        "5/8": 0.625,
        "7/8": 0.875
      };

      if (FRACTIONS[token] !== undefined) {
        return FRACTIONS[token];
      }

      if (/^\d+(?:\.\d+)?$/.test(token)) {
        return Number(token);
      }

      return null;
    }

    function parseIngredientLine(line) {
      const cleanLine = line.replace(/\s+\(zum Servieren\)|\s+\(optional\)|\s+\(zum Garnieren\)|\s+\(zum Anbraten\)|\s+\(zum Bestäuben\)/gi, "").trim();
      const match = cleanLine.match(/^((?:\d+\s+)?(?:\d+\/\d+|\d+(?:\.\d+)?)|[¼½¾⅓⅔⅛⅜⅝⅞])\s+(.+)$/);
      if (!match) {
        return {
          quantity: null,
          unit: "",
          name: cleanLine,
          key: cleanLine.toLowerCase()
        };
      }

      const rawQuantity = match[1].trim();
      const rest = match[2].trim();
      const quantityParts = rawQuantity.split(/\s+/);
      let quantity = 0;
      quantityParts.forEach((part) => {
        const parsed = parseFractionToken(part);
        if (parsed !== null) {
          quantity += parsed;
        }
      });

      if (!quantity) {
        quantity = parseFractionToken(rawQuantity);
      }

      const countUnits = new Set([
        "Ei", "Eier", "Zehe", "Zehen", "Zwiebel", "Zwiebeln", "Banane", "Bananen", "Birne", "Birnen",
        "Tomate", "Tomaten", "Kiwi", "Kiwis", "Avocado", "Avocados", "Limette", "Limetten",
        "Zitrone", "Zitronen", "Karotte", "Karotten", "Kartoffel", "Kartoffeln", "Scheibe", "Scheiben",
        "Stange", "Stangen", "Zweig", "Zweige", "Blatt", "Blätter", "Stück", "Stueck", "Dose", "Dosen",
        "Packung", "Packungen", "Handvoll", "Brötchen", "Brötchen", "Paprika", "Pitabrote", "Würstchen",
        "Wiener", "Hähnchenbrustfilets", "Tortellini", "Gnocchi", "Hot-Dog-Brötchen", "Süßkartoffeln",
        "Karotten", "Rote Bete", "Zucchini", "Kichererbsen", "Essiggurken", "Sandwich", "Roggenbrot"
      ]);

      const restParts = rest.split(/\s+/);
      const firstWord = restParts[0];
      let unit = "";
      let name = rest;

      if (/^(g|kg|ml|l|TL|EL|Prise|cm|mm|mL|cl|oz|cup|cups)$/i.test(firstWord)) {
        unit = firstWord;
        name = restParts.slice(1).join(" ");
      } else if (countUnits.has(firstWord)) {
        unit = "Stück";
        name = rest;
      } else if (restParts.length === 1) {
        unit = "Stück";
        name = rest;
      }

      const normalizedName = normalizeIngredientName(name);

      return {
        quantity,
        unit,
        name: name.trim(),
        key: `${normalizedName}|${unit.toLowerCase()}`
      };
    }

    function formatAmount(value) {
      const rounded = Math.round(value * 100) / 100;
      if (Number.isInteger(rounded)) {
        return String(rounded);
      }
      return String(rounded).replace(/\.0+$/, "").replace(/(\.\d*[1-9])0+$/, "$1");
    }

    function shouldRoundQuantity(unit) {
      return ["g", "kg", "Stück"].includes(unit);
    }

    function formatIngredientLabel(item, scale = 1) {
      const amount = item.quantity === null ? null : item.quantity * scale;
      const quantity = amount === null
        ? ""
        : `${shouldRoundQuantity(item.unit) ? String(Math.round(amount)) : formatAmount(amount)} `;
      const unit = item.unit ? `${item.unit} ` : "";
      return `${quantity}${unit}${item.name}`.trim();
    }

    function shouldHideIngredient(item) {
      return isAlwaysOmittedIngredient(item) || (hideSpices && isSpiceIngredient(item));
    }

    function getAllProductLinkItems() {
      const items = new Map();
      allRows.forEach((row, rowIndex) => {
        getIngredientsForRow(row, rowIndex, 1).forEach((item) => {
          if (isAlwaysOmittedIngredient(item)) {
            return;
          }

          if (!items.has(item.globalKey)) {
            items.set(item.globalKey, {
              key: item.globalKey,
              name: item.name,
              label: item.name,
              url: productLinks[item.globalKey] || ""
            });
          }
        });
      });

      return Array.from(items.values()).sort((a, b) => a.name.localeCompare(b.name, "de"));
    }

    function getInvalidProductLinkItems() {
      return getAllProductLinkItems().filter((item) => {
        const url = productLinks[item.key];
        const status = productLinkStatus[item.key];
        return !url || status === "bad";
      });
    }

    function getProductProxyUrl(url) {
      return `https://r.jina.ai/http://${url.replace(/^https?:\/\//i, "")}`;
    }

    async function checkProductLink(item, token) {
      const url = productLinks[item.key];
      if (!url) {
        productLinkStatus[item.key] = "missing";
        return;
      }

      productLinkStatus[item.key] = "checking";
      renderProductHelperButton();

      try {
        const response = await fetch(getProductProxyUrl(url), { cache: "no-store" });
        const text = response.ok ? await response.text() : "";
        const haystack = text.toLowerCase();
        const looksUnavailable = !response.ok
          || haystack.includes("404")
          || haystack.includes("seite nicht gefunden")
          || haystack.includes("nicht gefunden")
          || haystack.includes("keine treffer");

        if (token !== productCheckToken) {
          return;
        }

        productLinkStatus[item.key] = looksUnavailable ? "bad" : "ok";
      } catch (error) {
        if (token === productCheckToken) {
          productLinkStatus[item.key] = "bad";
        }
      }
    }

    async function validateProductLinks() {
      const token = ++productCheckToken;
      const items = getAllProductLinkItems().filter((item) => productLinks[item.key]);
      getAllProductLinkItems().forEach((item) => {
        if (!productLinks[item.key]) {
          productLinkStatus[item.key] = "missing";
        }
      });
      renderProductHelperButton();

      for (const item of items) {
        await checkProductLink(item, token);
        if (token !== productCheckToken) {
          return;
        }
        renderProductHelperButton();
        if (isProductHelperOpen) {
          renderProductHelper();
        }
      }
    }

    function buildProductLinksMarkdownBlock() {
      const sorted = Object.fromEntries(
        Object.entries(normalizeProductLinks(productLinks))
          .sort(([a], [b]) => a.localeCompare(b, "de"))
      );

      return `## Produktlinks\n\`\`\`json\n${JSON.stringify(sorted, null, 2)}\n\`\`\``;
    }

    function renderProductHelperButton() {
      const invalid = getInvalidProductLinkItems();
      productLinkHelperButton.dataset.invalid = invalid.length > 0 ? "true" : "false";
      productLinkHelperButton.setAttribute(
        "title",
        invalid.length > 0 ? `${invalid.length} Produktlinks fehlen oder sind nicht erreichbar` : "Produktlink-Helper"
      );
    }

    function setProductHelperVisibility(visible) {
      isProductHelperOpen = visible;
      productLinkHelper.hidden = !visible;
      if (visible) {
        currentProductHelperIndex = 0;
        renderProductHelper();
      }
    }

    function renderProductHelper() {
      const invalid = getInvalidProductLinkItems();
      const allItems = getAllProductLinkItems();
      const done = Math.max(0, allItems.length - invalid.length);
      const current = invalid[currentProductHelperIndex] || invalid[0] || null;

      productHelperMeta.textContent = `${done} von ${allItems.length} Artikeln verbunden`;
      productHelperExport.value = buildProductLinksMarkdownBlock();

      if (!current) {
        productHelperCurrent.innerHTML = "<strong>Alle Produktlinks sind hinterlegt und aktuell erreichbar.</strong>";
        productHelperSave.disabled = true;
        productHelperOpenSearch.disabled = true;
        productHelperSkip.disabled = true;
        productHelperStatus.textContent = "Den Markdown-Block unten kannst du in data.md übernehmen.";
        if (window.lucide && typeof window.lucide.createIcons === "function") {
          window.lucide.createIcons();
        }
        return;
      }

      const status = productLinkStatus[current.key] || "missing";
      const statusLabel = status === "bad"
        ? "Link nicht erreichbar"
        : status === "checking"
          ? "Prüfung läuft"
          : "Link fehlt";

      productHelperCurrent.innerHTML = `
        <div><strong>${escapeHtml(current.name)}</strong></div>
        <div>${currentProductHelperIndex + 1} von ${invalid.length} offenen Artikeln · ${statusLabel}</div>
        <input
          id="productHelperUrl"
          class="product-helper-input"
          type="url"
          value="${escapeHtml(productLinks[current.key] || "")}"
          placeholder="https://www.rewe.de/produkte/..."
          aria-label="Produktlink für ${escapeHtml(current.name)}"
        >
      `;
      productHelperSave.disabled = false;
      productHelperOpenSearch.disabled = false;
      productHelperSkip.disabled = invalid.length < 2;
      productHelperStatus.textContent = "Speichern aktualisiert zunächst den Browser-Speicher. Den Block unten danach in data.md übernehmen.";

      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    function getCurrentProductHelperItem() {
      const invalid = getInvalidProductLinkItems();
      return invalid[currentProductHelperIndex] || invalid[0] || null;
    }

    function getIngredientsForRow(row, rowIndex, scale = 1) {
      const ingredientCell = row[2] || "";
      return ingredientCell
        .split(/<br\s*\/?>/i)
        .map((part) => part.trim())
        .filter(Boolean)
        .map((line, ingredientIndex) => {
          const parsed = parseIngredientLine(line);
          return {
            ...parsed,
            rowIndex,
            ingredientIndex,
            instanceKey: `${rowIndex}|${ingredientIndex}|${parsed.key}`,
            globalKey: parsed.key,
            label: formatIngredientLabel(parsed, scale)
          };
        });
    }

    function mergeIngredientDetails(rows, scale = 1) {
      const grouped = new Map();

      rows.forEach(({ row, rowIndex }) => {
        getIngredientsForRow(row, rowIndex).forEach((parsed) => {
          if (isExcluded(parsed.instanceKey) || shouldHideIngredient(parsed)) {
            return;
          }

          const existing = grouped.get(parsed.key);
          if (!existing) {
            grouped.set(parsed.key, { ...parsed, quantity: parsed.quantity || null, recipes: new Set() });
            return;
          }

          existing.recipes = existing.recipes || new Set();
          if (parsed.quantity !== null && existing.quantity !== null && parsed.unit === existing.unit) {
            existing.quantity += parsed.quantity;
          } else if (existing.quantity === null && parsed.quantity !== null) {
            existing.quantity = parsed.quantity;
          }
        });
      });

      return Array.from(grouped.values()).map((item) => ({
        ...item,
        label: formatIngredientLabel(item, scale)
      })).sort((a, b) => a.label.localeCompare(b.label, "de"));
    }

    function mergeIngredients(rows, scale = 1) {
      return mergeIngredientDetails(rows, scale).map((item) => item.label);
    }

    function createIconMarkup(name) {
      if (name === "loader") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M21 12a9 9 0 1 1-6.2-8.6"></path>

      if (name === "truck") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 7h11v10H3z"></path>
            <path d="M14 10h3l3 3v4h-6z"></path>
            <circle cx="7" cy="18" r="1.5"></circle>
            <circle cx="18" cy="18" r="1.5"></circle>
          </svg>
        `;
      }

      if (name === "question-circle") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M9.5 9.3a3 3 0 1 1 4.9 2.3c-.9.7-1.9 1.2-1.9 2.4"></path>
            <path d="M12 17h.01"></path>

        `;
      }

      if (name === "trash-2") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M6 6l1 14h10l1-14"></path>
            <path d="M10 11v5"></path>
            <path d="M14 11v5"></path>
          </svg>
        `;
      }

      return "";
    }

    function buildReweBasketTerms(item) {
      const term = item.name.trim();
      const terms = [term];
      if (/^ja!/i.test(term)) {
        terms.push(term.replace(/^ja!\s*/i, "").trim());
      } else {
        terms.push(`JA! ${term}`);
      }
      return terms.filter(Boolean);
    }

    async function loadReweBasketSnapshot(force = false) {
      const now = Date.now();
      if (!force && reweBasketSnapshot.text && (now - reweBasketSnapshot.fetchedAt) < 5000) {
        return reweBasketSnapshot.text;
      }

      if (reweBasketSnapshot.promise) {
        return reweBasketSnapshot.promise;
      }

      reweBasketSnapshot.promise = (async () => {
        const cacheBust = `?_=${now}-${Math.random().toString(36).slice(2)}`;
        const url = `${REWE_BASKET_PROXY_URL}${cacheBust}`;

        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) {
            reweBasketSnapshot.text = "";
            reweBasketSnapshot.fetchedAt = now;
            return "";
          }

          const text = await response.text();
          reweBasketSnapshot.text = text;
          reweBasketSnapshot.fetchedAt = now;
          return text;
        } catch (error) {
          reweBasketSnapshot.text = "";
          reweBasketSnapshot.fetchedAt = now;
          return "";
        } finally {
          reweBasketSnapshot.promise = null;
        }
      })();

      return reweBasketSnapshot.promise;
    }

    function isItemInBasket(item, basketText) {
      const haystack = (basketText || "").toLowerCase();
      if (!haystack) {
        return false;
      }

      return buildReweBasketTerms(item).some((term) => haystack.includes(term.toLowerCase()));
    }

    async function refreshReweButtons(card, items, token) {
      const buttons = Array.from(card.querySelectorAll('.ingredient-action[data-action="rewe"]'));
      const basketText = activeBasketText;
      items.forEach((item, index) => {
        const button = buttons[index];
        if (!button) {
          return;
        }

        const available = isItemInBasket(item, basketText);
        if (token !== summaryRenderToken || !button.isConnected) {
          return;
        }

        if (isBasketLoading) {
          button.dataset.active = "false";
          button.dataset.available = "unknown";
          button.dataset.basket = "false";
          button.dataset.loading = "true";
          button.innerHTML = createIconMarkup("loader");
          const listItem = button.closest("li");
          if (listItem) {
            listItem.dataset.basket = "false";
          }
          return;
        }

        button.dataset.active = available ? "true" : "false";
        button.dataset.available = available ? "true" : "false";
        button.dataset.basket = available ? "true" : "false";
        button.dataset.loading = "false";
        button.innerHTML = createIconMarkup(available ? "truck" : "question-circle");

        const listItem = button.closest("li");
        if (listItem) {
          listItem.dataset.basket = available ? "true" : "false";
        }
      });
    }

    function getSelectedRecipeEntries() {
      return getCartRecipeEntries();
    }

    function setSummaryVisibility(visible) {
      isSummaryOpen = visible;
      summaryPanel.hidden = !visible;
      summaryButton.dataset.active = visible ? "true" : "false";
      summaryButton.setAttribute("aria-expanded", visible ? "true" : "false");
      if (portionScaleInput.value !== String(portionScale)) {
        portionScaleInput.value = String(portionScale);
      }
      if (visible) {
        const token = ++basketCheckToken;
        activeBasketText = "";
        isBasketLoading = true;
        renderSummary();
        loadReweBasketSnapshot(true).then((text) => {
          if (!isSummaryOpen || token !== basketCheckToken) {
            return;
          }

          isBasketLoading = false;
          activeBasketText = text;
          renderSummary();
        });
      } else {
        isBasketLoading = false;
      }
    }

    function renderSummary() {
      const renderToken = ++summaryRenderToken;
      const selected = getSelectedRecipeEntries();
      summaryCount.hidden = selected.length === 0;
      summaryCount.textContent = String(selected.length);
      summaryMeta.textContent = "";
      summaryTools.hidden = !isSummaryFilterOpen;
      summaryFilterButton.dataset.active = isSummaryFilterOpen ? "true" : "false";
      summaryFilterButton.setAttribute("aria-expanded", isSummaryFilterOpen ? "true" : "false");
      portionScaleWrap.hidden = !isCombineAll;
      spiceToggle.checked = hideSpices;

      if (selected.length === 0) {
        summaryContent.innerHTML = '<p class="summary-empty">Noch keine Rezepte im Warenkorb. Klick den Warenkorb neben einem Rezept an, um Zutaten zu sammeln.</p>';
        return;
      }

      if (isCombineAll) {
        const merged = mergeIngredientDetails(selected, portionScale);
        const section = document.createElement("section");
        section.className = "summary-card";
        section.innerHTML = `
          <ul class="summary-aggregate">
            ${merged.map((item) => `
              <li data-purchased="${isPurchased(item.globalKey) ? "true" : "false"}" data-basket="false">
                <button
                  type="button"
                  class="ingredient-main"
                  data-action="toggle-purchased"
                  data-global-key="${item.globalKey}"
                  aria-label="${item.label}"
                  title="${item.label}"
                >${item.label}</button>
                <span class="ingredient-actions">
                  <button
                    type="button"
                    class="ingredient-action"
                    data-action="rewe"
                    data-global-key="${item.globalKey}"
                    data-item-name="${item.name}"
                    data-item-label="${item.label}"
                    data-available="unknown"
                    aria-label="Im REWE-Warenkorb prüfen: ${item.label}"
                    title="Im REWE-Warenkorb prüfen"
                  >${createIconMarkup("truck")}</button>
                </span>
              </li>
            `).join("")}
          </ul>
        `;
        summaryContent.innerHTML = "";
        summaryContent.appendChild(section);
        refreshReweButtons(section, merged, renderToken);
        return;
      }

      summaryContent.innerHTML = "";
      selected.forEach(({ row, rowIndex }) => {
        const items = getIngredientsForRow(row, rowIndex, 1).filter((item) => !shouldHideIngredient(item));
        const section = document.createElement("section");
        section.className = "summary-card";
        section.innerHTML = `
          <h3>${row[0]}</h3>
          <ul class="summary-ingredients">
            ${items.map((item) => `
              <li data-purchased="${isPurchased(item.globalKey) ? "true" : "false"}" data-excluded="${isExcluded(item.instanceKey) ? "true" : "false"}" data-basket="false">
                <button
                  type="button"
                  class="ingredient-main"
                  data-action="toggle-purchased"
                  data-global-key="${item.globalKey}"
                  data-instance-key="${item.instanceKey}"
                  aria-label="${item.label}"
                  title="${item.label}"
                >${item.label}</button>
                <span class="ingredient-actions">
                  <button
                    type="button"
                    class="ingredient-action"
                    data-action="rewe"
                    data-global-key="${item.globalKey}"
                    data-instance-key="${item.instanceKey}"
                    data-item-name="${item.name}"
                    data-item-label="${item.label}"
                    data-available="unknown"
                    aria-label="Im REWE-Warenkorb prüfen: ${item.label}"
                    title="Im REWE-Warenkorb prüfen"
                  >${createIconMarkup("truck")}</button>
                  <button
                    type="button"
                    class="ingredient-action"
                    data-action="delete"
                    data-instance-key="${item.instanceKey}"
                    aria-label="${isExcluded(item.instanceKey) ? "Wieder einblenden" : "Ausblenden"}: ${item.label}"
                    title="${isExcluded(item.instanceKey) ? "Wieder einblenden" : "Ausblenden"}"
                    data-active="${isExcluded(item.instanceKey) ? "true" : "false"}"
                  >${createIconMarkup("trash-2")}</button>
                </span>
              </li>
            `).join("")}
          </ul>
        `;
        summaryContent.appendChild(section);
        refreshReweButtons(section, items, renderToken);
      });
    }

    function renderTable(headers, rowEntries) {
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";

      const ingredientColumnIndex = headers.indexOf("Zutaten für 1 Portion");
      const linkColumnIndex = headers.indexOf("Link");
      const kcalColumnIndex = headers.indexOf("kcal pro Portion");
      const visibleColumnIndexes = headers
        .map((_, index) => index)
        .filter((index) => index !== ingredientColumnIndex);

      if (linkColumnIndex !== -1 && kcalColumnIndex !== -1) {
        const linkPosition = visibleColumnIndexes.indexOf(linkColumnIndex);
        const kcalPosition = visibleColumnIndexes.indexOf(kcalColumnIndex);
        if (linkPosition !== -1 && kcalPosition !== -1) {
          [visibleColumnIndexes[linkPosition], visibleColumnIndexes[kcalPosition]] = [visibleColumnIndexes[kcalPosition], visibleColumnIndexes[linkPosition]];
        }
      }

      const headerRow = document.createElement("tr");
      const indexTh = document.createElement("th");
      indexTh.textContent = "#";
      headerRow.appendChild(indexTh);

      visibleColumnIndexes.forEach((columnIndex) => {
        const header = headers[columnIndex];
        const th = document.createElement("th");
        if (columnIndex === linkColumnIndex) {
          th.innerHTML = `
            <div class="recipe-header">
              <button
                type="button"
                class="filter-button"
                data-action="toggle-table-filters"
                data-active="${isFilterPopoverOpen ? "true" : "false"}"
                aria-label="Filter anzeigen"
                aria-expanded="${isFilterPopoverOpen ? "true" : "false"}"
                title="Filter"
              >
                <i data-lucide="list-filter" aria-hidden="true"></i>
              </button>
              <div class="filter-popover" ${isFilterPopoverOpen ? "" : "hidden"}>
                <label class="toggle">
                  <input type="checkbox" data-filter-control="selection" ${isFiltered ? "checked" : ""}>
                  Nur Auswahl anzeigen
                </label>
                <label class="toggle">
                  <input type="checkbox" data-filter-control="warm-cold" ${cardToggle.checked ? "checked" : ""}>
                  Warme / kalte Speisen
                </label>
              </div>
            </div>
          `;
        } else {
          th.textContent = header;
        }
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      rowEntries.forEach(({ row, rowIndex }) => {
        const tr = document.createElement("tr");

        const indexTd = document.createElement("td");
        indexTd.textContent = String(rowIndex + 1);
        indexTd.dataset.label = "#";
        tr.appendChild(indexTd);

        visibleColumnIndexes.forEach((cellIndex) => {
          const cell = row[cellIndex] || "";
          const td = document.createElement("td");
          td.dataset.label = cellIndex === linkColumnIndex ? "Link" : (headers[cellIndex] || "");
          const link = extractCellLink(cell);
          if (cellIndex === linkColumnIndex && link) {
            const wrapper = document.createElement("div");
            wrapper.className = "recipe-actions";

            const a = document.createElement("a");
            a.href = link.href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.className = "recipe-text-link";
            a.setAttribute("aria-label", `Rezept öffnen: ${row[0]}`);
            a.setAttribute("title", `Rezept öffnen: ${row[0]}`);
            a.innerHTML = '<i data-lucide="link-2" aria-hidden="true"></i>';

            const cartButton = document.createElement("button");
            cartButton.type = "button";
            cartButton.className = "cart-toggle";
            cartButton.dataset.active = isInCart(rowIndex) ? "true" : "false";
            cartButton.dataset.rowIndex = String(rowIndex);
            cartButton.setAttribute("aria-label", isInCart(rowIndex) ? `Aus Warenkorb entfernen: ${row[0]}` : `Zum Warenkorb hinzufügen: ${row[0]}`);
            cartButton.setAttribute("title", isInCart(rowIndex) ? `Aus Warenkorb entfernen: ${row[0]}` : `Zum Warenkorb hinzufügen: ${row[0]}`);
            cartButton.innerHTML = isInCart(rowIndex)
              ? '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="8" cy="21" r="1.5"></circle><circle cx="18" cy="21" r="1.5"></circle><path d="M2.5 3h2l2.2 12.2a2 2 0 0 0 2 1.6h8.5a2 2 0 0 0 2-1.5L21 7H6.2"></path></svg><span class="sr-only">Im Warenkorb</span>'
              : '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="8" cy="21" r="1.5"></circle><circle cx="18" cy="21" r="1.5"></circle><path d="M2.5 3h2l2.2 12.2a2 2 0 0 0 2 1.6h8.5a2 2 0 0 0 2-1.5L21 7H6.2"></path></svg><span class="sr-only">Zum Warenkorb hinzufügen</span>';

            wrapper.appendChild(a);
            wrapper.appendChild(cartButton);
            td.appendChild(wrapper);
          } else {
            td.innerHTML = cell;
          }
          tr.appendChild(td);
        });

        tableBody.appendChild(tr);
      });

      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    function renderCurrentTable() {
      const rowEntries = (isFiltered ? selectedRowIndexes : allRows.map((_, index) => index))
        .map((rowIndex) => ({ row: allRows[rowIndex], rowIndex }));

      renderTable(allHeaders, rowEntries);
      statusEl.textContent = isFiltered
        ? ``
        : ``;
    }

    function pickRandomNumbers(count, max) {
      const pool = Array.from({ length: max }, (_, index) => index);
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(count, pool.length));
    }

    function getSelectionPool() {
      if (cardToggle.checked) {
        const start = Math.min(WARM_COLD_START_INDEX, allRows.length);
        const end = Math.min(WARM_COLD_END_INDEX, allRows.length);
        return Array.from({ length: Math.max(0, end - start) }, (_, index) => start + index);
      }

      return Array.from({ length: allRows.length }, (_, index) => index);
    }

    function renderRandomRows(indices) {
      randomRowsEl.innerHTML = "";
      indices.forEach((index, position) => {
        const span = document.createElement("span");
        span.textContent = String(index + 1);
        randomRowsEl.appendChild(span);
        if (position < indices.length - 1) {
          const comma = document.createElement("span");
          comma.textContent = ",";
          randomRowsEl.appendChild(comma);
        }
      });
    }

    function refreshSelection() {
      const pool = getSelectionPool();
      const picked = pickRandomNumbers(5, pool.length);
      selectedRowIndexes = picked.map((position) => pool[position]);
      renderRandomRows(selectedRowIndexes);
      renderCurrentTable();
    }

    async function init() {
      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Markdown konnte nicht geladen werden (${response.status}).`);
        }

        const markdown = await response.text();
        const { headers, rows } = parseMarkdownTable(markdown);
        const markdownProductLinks = normalizeProductLinks(parseProductLinksFromMarkdown(markdown));

        allHeaders = headers;
        allRows = rows;
        recipeRows = rows;
        productLinks = normalizeProductLinks({ ...markdownProductLinks, ...productLinks });
        saveProductLinks();
        refreshSelection();
        renderWeekPlan();
        renderSummary();
        validateProductLinks();
      } catch (error) {
        statusEl.textContent = "Fehler beim Laden.";
        errorEl.hidden = false;
        errorEl.textContent = `${error.message}\n\nLege eine Markdown-Datei unter ${DEFAULT_SOURCE} ab oder übergib eine URL mit ?source=https://...`;
      }
    }

    filterToggle.addEventListener("change", () => {
      if (allRows.length === 0) {
        return;
      }

      isFiltered = filterToggle.checked;
      renderCurrentTable();
    });

    cardToggle.addEventListener("change", () => {
      if (allRows.length === 0) {
        return;
      }

      refreshSelection();
    });

    tableHead.addEventListener("click", (event) => {
      const filterButton = event.target.closest('[data-action="toggle-table-filters"]');
      if (!filterButton) {
        return;
      }

      isFilterPopoverOpen = !isFilterPopoverOpen;
      renderCurrentTable();
    });

    tableHead.addEventListener("change", (event) => {
      const control = event.target.closest("[data-filter-control]");
      if (!control) {
        return;
      }

      if (control.dataset.filterControl === "selection") {
        filterToggle.checked = control.checked;
        isFiltered = control.checked;
        renderCurrentTable();
        return;
      }

      if (control.dataset.filterControl === "warm-cold") {
        cardToggle.checked = control.checked;
        refreshSelection();
      }
    });

    tableBody.addEventListener("click", (event) => {
      const button = event.target.closest(".cart-toggle");
      if (!button) {
        return;
      }

      const rowIndex = Number(button.dataset.rowIndex);
      if (Number.isNaN(rowIndex)) {
        return;
      }

      toggleCart(rowIndex);
    });

    // Wheat button toggle
    weekPlan.addEventListener("click", (event) => {
      const item = event.target.closest(".week-plan-item");
      if (item) {
        const rowIndex = Number(item.dataset.rowIndex);
        const linkIndex = allHeaders.indexOf("Link");
        const row = allRows[rowIndex];
        const link = row && linkIndex !== -1 ? extractCellLink(row[linkIndex] || "") : null;
        if (link) {
          window.open(link.href, "_blank", "noopener,noreferrer");
        }
        return;
      }

      const btn = event.target.closest(".week-plan-wheat-btn");
      if (!btn) return;
      const slot = Number(btn.dataset.slot);
      if (Number.isNaN(slot)) return;
      const existing = slotExtraKcal[slot] || { active: false, kcal: 400 };
      slotExtraKcal[slot] = { ...existing, active: !existing.active };
      saveSlotExtraKcal();
      renderWeekPlan();
    });

    // Extra kcal input change
    weekPlan.addEventListener("change", (event) => {
      const input = event.target.closest(".week-plan-extra-input");
      if (!input) return;
      const slot = Number(input.dataset.slot);
      if (Number.isNaN(slot)) return;
      const val = Math.max(0, Number(input.value) || 0);
      const existing = slotExtraKcal[slot] || { active: false, kcal: 400 };
      slotExtraKcal[slot] = { ...existing, kcal: val };
      saveSlotExtraKcal();
      renderWeekPlan();
    });

    weekPlan.addEventListener("dragstart", (event) => {
      const item = event.target.closest(".week-plan-item");
      if (!item) {
        return;
      }

      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", item.dataset.rowIndex || "");
    });

    weekPlan.addEventListener("dragover", (event) => {
      autoScrollWeekPlan(event);
      const column = event.target.closest(".week-plan-column");
      if (!column) {
        return;
      }

      event.preventDefault();
      column.dataset.dragOver = "true";
    });

    weekPlan.addEventListener("dragleave", (event) => {
      const column = event.target.closest(".week-plan-column");
      if (!column || column.contains(event.relatedTarget)) {
        return;
      }

      column.dataset.dragOver = "false";
    });

    weekPlan.addEventListener("drop", (event) => {
      const column = event.target.closest(".week-plan-column");
      if (!column) {
        return;
      }

      event.preventDefault();
      column.dataset.dragOver = "false";
      const rowIndex = event.dataTransfer.getData("text/plain");
      const slot = Number(column.dataset.slot);
      if (!rowIndex || Number.isNaN(slot)) {
        return;
      }

      weekPlanState[rowIndex] = slot;
      saveWeekPlanState();
      renderWeekPlan();
    });

    weekPlanScrollButton.addEventListener("click", () => {
      scrollWeekPlanToOppositeSide();
    });

    window.addEventListener("resize", () => {
      updateWeekPlanScrollButton();
    });

    productLinkHelperButton.addEventListener("click", () => {
      setProductHelperVisibility(!isProductHelperOpen);
    });

    productHelperClose.addEventListener("click", () => {
      setProductHelperVisibility(false);
    });

    productHelperSave.addEventListener("click", async () => {
      const item = getCurrentProductHelperItem();
      const input = document.getElementById("productHelperUrl");
      if (!item || !input) {
        return;
      }

      const url = input.value.trim();
      if (!/^https?:\/\//i.test(url)) {
        productHelperStatus.textContent = "Bitte eine vollständige URL mit https:// eintragen.";
        input.focus();
        return;
      }

      productLinks[item.key] = url;
      saveProductLinks();
      productHelperStatus.textContent = "Link wird geprüft...";
      await checkProductLink(item, productCheckToken);
      renderProductHelperButton();
      renderProductHelper();
    });

    productHelperOpenSearch.addEventListener("click", () => {
      const item = getCurrentProductHelperItem();
      if (!item) {
        return;
      }

      openReweSearchForItem(item.name);
    });

    productHelperSkip.addEventListener("click", () => {
      const invalid = getInvalidProductLinkItems();
      if (invalid.length === 0) {
        return;
      }

      currentProductHelperIndex = (currentProductHelperIndex + 1) % invalid.length;
      renderProductHelper();
    });

    productHelperCopy.addEventListener("click", async () => {
      const value = buildProductLinksMarkdownBlock();
      productHelperExport.value = value;
      productHelperExport.select();

      try {
        await navigator.clipboard.writeText(value);
        productHelperStatus.textContent = "Markdown-Block kopiert. Ersetze damit den Abschnitt ## Produktlinks in data.md.";
      } catch (error) {
        productHelperStatus.textContent = "Kopieren nicht möglich. Der Block ist im Textfeld markiert.";
      }
    });

    summaryContent.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-action]");
      const mainButton = event.target.closest(".ingredient-main");
      if (!actionButton && !mainButton) {
        return;
      }

      const button = actionButton || mainButton;
      const action = button.dataset.action || "toggle-purchased";

      if (action === "toggle-purchased") {
        const globalKey = button.dataset.globalKey;
        if (!globalKey) {
          return;
        }

        setIngredientPurchasedFromKey(globalKey, !isPurchased(globalKey));
        return;
      }

      if (action === "rewe") {
        const itemName = button.dataset.itemName || "";
        const itemLabel = button.dataset.itemLabel || itemName;
        const globalKey = button.dataset.globalKey || "";
        openReweSearchForItem(itemName, globalKey);
        if (globalKey) {
          setPendingBasketItem({
            globalKey,
            label: itemLabel || itemName || "Produkt"
          });
        }
        renderSummary();
        return;
      }

      if (action === "delete") {
        const instanceKey = button.dataset.instanceKey;
        if (!instanceKey) {
          return;
        }

        setIngredientExcludedFromKey(instanceKey, !isExcluded(instanceKey));
      }
    });

    summaryButton.addEventListener("click", () => {
      setSummaryVisibility(!isSummaryOpen);
    });

    summaryCount.addEventListener("animationend", () => {
      summaryCount.dataset.animate = "";
    });

    summaryFilterButton.addEventListener("click", () => {
      isSummaryFilterOpen = !isSummaryFilterOpen;
      renderSummary();
    });

    selectionCartButton.addEventListener("click", () => {
      runMagicSelection();
    });

    basketPrompt.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button || !pendingPrompt) {
        return;
      }

      if (button.dataset.action === "confirm") {
        if (pendingPrompt.type === "basket") {
          setIngredientPurchasedFromKey(pendingPrompt.globalKey, true);
          clearPendingPrompt();
          return;
        }

        if (pendingPrompt.type === "overwrite") {
          clearPendingPrompt();
          runMagicSelection({ overwrite: true });
          return;
        }

        clearPendingPrompt();
        return;
      }

      if (button.dataset.action === "cancel") {
        clearPendingPrompt();
      }
    });

    combineToggle.addEventListener("change", () => {
      isCombineAll = combineToggle.checked;
      renderSummary();
    });

    spiceToggle.addEventListener("change", () => {
      hideSpices = spiceToggle.checked;
      saveHideSpices();
      renderSummary();
    });

    portionScaleInput.addEventListener("change", () => {
      const parsed = Number.parseInt(portionScaleInput.value, 10);
      portionScale = Number.isFinite(parsed) && parsed > 0 ? parsed : 1;
      portionScaleInput.value = String(portionScale);
      savePortionScale();
      if (isSummaryOpen) {
        renderSummary();
      }
    });

    clearCartButton.addEventListener("click", () => {
      cartState = {};
      weekPlanState = {};
      purchasedState = {};
      excludedState = {};
      slotExtraKcal = {};
      activeBasketText = "";
      isBasketLoading = false;
      reweBasketSnapshot.text = "";
      reweBasketSnapshot.fetchedAt = 0;
      clearPendingPrompt();
      saveCartState();
      saveWeekPlanState();
      saveBooleanMap(PURCHASED_STORAGE_KEY, purchasedState);
      saveBooleanMap(EXCLUDED_STORAGE_KEY, excludedState);
      saveSlotExtraKcal();
      renderCurrentTable();
      renderWeekPlan();
      renderSummary();
    });

    init();
  </script>
</body>
</html>
