<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KARTE DES HAUSES</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --muted: #6b6b6b;
      --line: #000000;
      --success: #138a36;
      --panel-bg: #ffffff;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      padding: 32px 24px 40px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 18px;
      letter-spacing: 0.02em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: baseline;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.4;
    }

    .meta strong {
      font-weight: 700;
    }

    .random-row {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .random-row span {
      display: inline-block;
      padding: 2px 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .top-actions {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 42px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.65) inset;
    }

    .icon-button[data-active="true"] {
      background: #eaf8ee;
      border-color: var(--success);
      color: var(--success);
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.9;
    }

    .icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--success);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      padding: 9px 14px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #f5f5f5;
    }

    button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      user-select: none;
    }

    .toggle input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #000;
    }

    .recipe-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      color: var(--fg);
      text-decoration: none;
      line-height: 1;
    }

    .recipe-link:hover {
      background: #f5f5f5;
    }

    .recipe-link svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.9;
    }

    .recipe-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .recipe-text-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid transparent;
      text-decoration: none;
      line-height: 1.2;
    }

    .recipe-text-link:hover,
    .recipe-text-link:focus-visible {
      border-color: var(--line);
      background: #f5f5f5;
    }

    .recipe-text-link svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.9;
      flex: none;
    }

    .cart-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
    }

    .cart-toggle:hover,
    .cart-toggle:focus-visible {
      background: #f5f5f5;
    }

    .cart-toggle[data-active="true"] {
      background: #eaf8ee;
      border-color: var(--success);
      color: var(--success);
    }

    .cart-toggle svg {
      width: 15px;
      height: 15px;
      stroke-width: 2;
    }

    .summary-panel {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-bg);
      padding: 16px;
      margin: 0 0 18px;
    }

    .summary-panel[hidden] {
      display: none;
    }

    .summary-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .summary-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .summary-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 14px;
    }

    .summary-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .summary-toggle input {
      margin: 0;
      accent-color: var(--success);
    }

    .summary-list {
      display: grid;
      gap: 12px;
    }

    .summary-card {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .summary-card:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .summary-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .summary-card ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.55;
    }

    .summary-aggregate {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .summary-aggregate li {
      border-bottom: 1px dotted rgba(0, 0, 0, 0.18);
      padding-bottom: 6px;
    }

    .summary-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      font-size: 13px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    tbody tr:hover {
      background: #f5f5f5;
    }

    a {
      color: var(--fg);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 0;
    }

    .error {
      color: #000;
      border: 1px solid var(--line);
      padding: 12px;
      margin-top: 16px;
      font-size: 13px;
    }

    code {
      font-family: inherit;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      body {
        padding: 20px 14px 28px;
      }

      h1 {
        font-size: 18px;
      }

      thead th,
      tbody td {
        padding-left: 8px;
        padding-right: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>KARTE DES HAUSES</h1>
    <div class="top-actions">
      <button id="summaryButton" class="icon-button" type="button" aria-label="Rezeptübersicht öffnen" aria-expanded="false" title="Rezeptübersicht öffnen">
        <i data-lucide="receipt-text" aria-hidden="true"></i>
        <span id="summaryCount" class="icon-badge" hidden>0</span>
      </button>
    </div>
    <div class="meta">
      <strong>Auswahl der Rezepte:</strong>
      <div id="randomRows" class="random-row"></div>
    </div>
    <div class="controls">
      <label class="toggle">
        <input id="filterToggle" type="checkbox" checked>
        Nur Auswahl anzeigen
      </label>
      <label class="toggle">
        <input id="cardToggle" type="checkbox" checked>
        Warme / kalte Speisen
      </label>
    </div>
    <section id="summaryPanel" class="summary-panel" hidden aria-label="Rezeptübersicht">
      <div class="summary-header">
        <div>
          <h2 class="summary-title">Rezept-Übersicht</h2>
          <p id="summaryMeta" class="summary-subtitle"></p>
        </div>
        <button id="summaryCloseButton" class="icon-button" type="button" aria-label="Übersicht schließen" title="Übersicht schließen">
          <i data-lucide="x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="summary-tools">
        <label class="summary-toggle">
          <input id="combineToggle" type="checkbox">
          Alles zusammenfassen
        </label>
        <button id="clearCartButton" type="button">Alle entfernen</button>
      </div>
      <div id="summaryContent" class="summary-list"></div>
    </section>
    <div id="status" class="status"></div>
    <div id="error" class="error" hidden></div>
    <div class="table-wrap">
      <table aria-label="Markdown Tabelle">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script>
    const DEFAULT_SOURCE = "./data.md";
    const sourceUrl = new URLSearchParams(window.location.search).get("source") || DEFAULT_SOURCE;
    const CART_STORAGE_KEY = "recipe-cart-state-v1";

    const randomRowsEl = document.getElementById("randomRows");
    const filterToggle = document.getElementById("filterToggle");
    const cardToggle = document.getElementById("cardToggle");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");
    const summaryButton = document.getElementById("summaryButton");
    const summaryCount = document.getElementById("summaryCount");
    const summaryPanel = document.getElementById("summaryPanel");
    const summaryCloseButton = document.getElementById("summaryCloseButton");
    const summaryMeta = document.getElementById("summaryMeta");
    const summaryContent = document.getElementById("summaryContent");
    const combineToggle = document.getElementById("combineToggle");
    const clearCartButton = document.getElementById("clearCartButton");

    let allHeaders = [];
    let allRows = [];
    let recipeRows = [];
    let selectedRowIndexes = [];
    let isFiltered = true;
    const WARM_COLD_START_INDEX = 6;
    const WARM_COLD_END_INDEX = 28;
    let cartState = loadCartState();
    let isSummaryOpen = false;
    let isCombineAll = false;

    function splitMarkdownRow(line) {
      return line
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => cell.trim());
    }

    function isSeparatorRow(line) {
      return /^\s*\|?[:\- ]+\|[:\-\| ]+\s*$/.test(line) && line.includes("-");
    }

    function parseMarkdownTable(markdown) {
      const lines = markdown
        .split(/\r?\n/)
        .map((line) => line.trimEnd())
        .filter((line) => line.trim().length > 0);

      const tableStart = lines.findIndex((line, index) => {
        const next = lines[index + 1];
        return line.includes("|") && next && isSeparatorRow(next);
      });

      if (tableStart === -1) {
        throw new Error("Keine Markdown-Tabelle gefunden.");
      }

      const headers = splitMarkdownRow(lines[tableStart]);
      const rows = [];

      for (let i = tableStart + 2; i < lines.length; i += 1) {
        const line = lines[i];
        if (!line.includes("|")) break;
        rows.push(splitMarkdownRow(line));
      }

      return { headers, rows };
    }

    function extractCellLink(cell) {
      const markdownLink = cell.match(/\[([^\]]+)\]\(([^)]+)\)/);
      if (markdownLink) {
        return {
          text: markdownLink[1],
          href: markdownLink[2]
        };
      }

      const plainUrl = cell.match(/https?:\/\/[^\s)]+/);
      if (plainUrl) {
        return {
          text: cell,
          href: plainUrl[0]
        };
      }

      return null;
    }

    const INGREDIENT_ALIASES = new Map([
      ["eier", "ei"],
      ["ei", "ei"],
      ["eigelbe", "eigelb"],
      ["eigelb", "eigelb"],
      ["zehen knoblauch", "knoblauch"],
      ["zehe knoblauch", "knoblauch"],
      ["knoblauchzehe", "knoblauch"],
      ["knoblauchzehen", "knoblauch"],
      ["walnüsse", "walnuss"],
      ["walnusskerne", "walnuss"],
      ["mandeln", "mandel"],
      ["mandel", "mandel"],
      ["bananen", "banane"],
      ["banane", "banane"],
      ["blaubeeren", "blaubeere"],
      ["blaubeere", "blaubeere"],
      ["chia-samen", "chiasamen"],
      ["chiasamen", "chiasamen"],
      ["kirschtomaten", "kirschtomate"],
      ["kirschtomate", "kirschtomate"],
      ["cocktailtomaten", "kirschtomate"],
      ["cocktailtomate", "kirschtomate"],
      ["tomaten", "tomate"],
      ["tomate", "tomate"],
      ["zuckerschoten", "zuckerschote"],
      ["zuckerschote", "zuckerschote"],
      ["limetten", "limette"],
      ["limette", "limette"],
      ["zitronen", "zitrone"],
      ["zitrone", "zitrone"],
      ["karotten", "karotte"],
      ["karotte", "karotte"],
      ["süßkartoffeln", "süßkartoffel"],
      ["süßkartoffel", "süßkartoffel"],
      ["hähnchenbrustfilets", "hähnchenbrustfilet"],
      ["hähnchenbrustfilet", "hähnchenbrustfilet"],
      ["hähnchenbrust", "hähnchenbrustfilet"],
      ["romana salatherzen", "romana salatherz"],
      ["romana salatherz", "romana salatherz"],
      ["parmesankäse", "parmesan"],
      ["parmesan", "parmesan"],
      ["parmesan (gerieben)", "parmesan"],
      ["pecorinokäse", "pecorino"],
      ["pecorino", "pecorino"],
      ["fetakäse", "feta"],
      ["feta", "feta"],
      ["mozzarellakäse", "mozzarella"],
      ["mozzarella", "mozzarella"],
      ["cheddarkäse", "cheddar"],
      ["cheddar", "cheddar"],
      ["pitabrote", "pitabrot"],
      ["pitabrot", "pitabrot"],
      ["sardellenfilets", "sardellenfilet"],
      ["sardellenfilet", "sardellenfilet"],
      ["schlagsahne", "sahne"],
      ["sahne", "sahne"],
      ["haselnüsse", "haselnuss"],
      ["haselnuss", "haselnuss"],
      ["pinienkerne", "pinienkern"],
      ["pinienkern", "pinienkern"],
      ["butter (zum einfetten)", "butter"],
      ["ungesalzene butter", "butter"],
      ["butter", "butter"],
      ["rote zwiebel", "rote zwiebel"],
      ["zwiebel (rot)", "rote zwiebel"],
      ["rote paprika", "rote paprika"],
      ["paprika (rot)", "rote paprika"],
      ["gelbe paprika", "gelbe paprika"],
      ["paprika (gelb)", "gelbe paprika"],
      ["zwiebeln", "zwiebel"],
      ["zwiebel", "zwiebel"],
      ["spinat (gefroren)", "spinat"],
      ["brötchen (vom vortag)", "brötchen"],
      ["olivenöl (zum bestreuen)", "olivenöl"],
      ["limette (abrieb und saft)", "limette"],
      ["stangen", "stange"],
      ["stange", "stange"],
      ["blätter", "blatt"],
      ["blatt", "blatt"],
      ["zweige", "zweig"],
      ["zweig", "zweig"],
      ["scheiben", "scheibe"],
      ["scheibe", "scheibe"]
    ]);

    function normalizeIngredientName(name) {
      const cleaned = name
        .replace(/\s*\(.*?\)\s*/g, " ")
        .replace(/\b(zum servieren|zum garnieren|zum bestäuben|zum anbraten|optional)\b/gi, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();

      if (/\brote?\s+zwiebel\b|\bzwiebel\s+rot\b/.test(cleaned)) {
        return "rote zwiebel";
      }
      if (/\brote?\s+paprika\b|\bpaprika\s+rot\b|\bgegrillte paprika\b/.test(cleaned)) {
        return "rote paprika";
      }
      if (/\bgelbe?\s+paprika\b|\bpaprika\s+gelb\b/.test(cleaned)) {
        return "gelbe paprika";
      }
      if (/\bbutter\b/.test(cleaned)) {
        return "butter";
      }
      if (/\bspinat\s+gefroren\b/.test(cleaned)) {
        return "spinat";
      }
      if (/\bbrötchen\s+vom vortag\b/.test(cleaned)) {
        return "brötchen";
      }
      if (/\blimette\s+abrieb und saft\b/.test(cleaned)) {
        return "limette";
      }
      if (/\bcocktailtomate\b|\bkirschtomate\b/.test(cleaned)) {
        return "kirschtomate";
      }
      if (/\bhähnchenbrust\b/.test(cleaned)) {
        return "hähnchenbrustfilet";
      }

      if (INGREDIENT_ALIASES.has(cleaned)) {
        return INGREDIENT_ALIASES.get(cleaned);
      }

      return cleaned
        .replace(/^zehen\s+knoblauch$/, "knoblauch")
        .replace(/^zehe\s+knoblauch$/, "knoblauch")
        .replace(/\s+käse$/, "")
        .replace(/\s+filets$/, "")
        .replace(/\s+kerne$/, "")
        .replace(/\s+eier$/, "")
        .replace(/\s+limetten$/, "")
        .replace(/\s+zitronen$/, "")
        .replace(/\s+tomaten$/, "")
        .replace(/\s+beeren$/, "")
        .replace(/\s+brote$/, "")
        .replace(/\s+scheiben$/, " scheibe")
        .replace(/\s+zweige$/, " zweig")
        .replace(/\s+stangen$/, " stange");
    }

    function getStoredCart() {
      try {
        const raw = localStorage.getItem(CART_STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (error) {
        return {};
      }
    }

    function loadCartState() {
      return getStoredCart();
    }

    function saveCartState() {
      localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cartState));
    }

    function getRecipeKey(rowIndex) {
      return String(rowIndex);
    }

    function isInCart(rowIndex) {
      return Boolean(cartState[getRecipeKey(rowIndex)]);
    }

    function setCartState(rowIndex, active) {
      const key = getRecipeKey(rowIndex);
      if (active) {
        cartState[key] = true;
      } else {
        delete cartState[key];
      }
      saveCartState();
      renderCurrentTable();
      renderSummary();
    }

    function toggleCart(rowIndex) {
      setCartState(rowIndex, !isInCart(rowIndex));
    }

    function parseFractionToken(token) {
      const FRACTIONS = {
        "1/2": 0.5,
        "1/4": 0.25,
        "3/4": 0.75,
        "1/3": 1 / 3,
        "2/3": 2 / 3,
        "1/8": 0.125,
        "3/8": 0.375,
        "5/8": 0.625,
        "7/8": 0.875
      };

      if (FRACTIONS[token] !== undefined) {
        return FRACTIONS[token];
      }

      if (/^\d+(?:\.\d+)?$/.test(token)) {
        return Number(token);
      }

      return null;
    }

    function parseIngredientLine(line) {
      const cleanLine = line.replace(/\s+\(zum Servieren\)|\s+\(optional\)|\s+\(zum Garnieren\)|\s+\(zum Anbraten\)|\s+\(zum Bestäuben\)/gi, "").trim();
      const match = cleanLine.match(/^((?:\d+\s+)?(?:\d+\/\d+|\d+(?:\.\d+)?)|[¼½¾⅓⅔⅛⅜⅝⅞])\s+(.+)$/);
      if (!match) {
        return {
          quantity: null,
          unit: "",
          name: cleanLine,
          key: cleanLine.toLowerCase()
        };
      }

      const rawQuantity = match[1].trim();
      const rest = match[2].trim();
      const quantityParts = rawQuantity.split(/\s+/);
      let quantity = 0;
      quantityParts.forEach((part) => {
        const parsed = parseFractionToken(part);
        if (parsed !== null) {
          quantity += parsed;
        }
      });

      if (!quantity) {
        quantity = parseFractionToken(rawQuantity);
      }

      const countUnits = new Set([
        "Ei", "Eier", "Zehe", "Zehen", "Zwiebel", "Zwiebeln", "Banane", "Bananen", "Birne", "Birnen",
        "Tomate", "Tomaten", "Kiwi", "Kiwis", "Avocado", "Avocados", "Limette", "Limetten",
        "Zitrone", "Zitronen", "Karotte", "Karotten", "Kartoffel", "Kartoffeln", "Scheibe", "Scheiben",
        "Stange", "Stangen", "Zweig", "Zweige", "Blatt", "Blätter", "Stück", "Stueck", "Dose", "Dosen",
        "Packung", "Packungen", "Handvoll", "Brötchen", "Brötchen", "Paprika", "Pitabrote", "Würstchen",
        "Wiener", "Hähnchenbrustfilets", "Tortellini", "Gnocchi", "Hot-Dog-Brötchen", "Süßkartoffeln",
        "Karotten", "Rote Bete", "Zucchini", "Kichererbsen", "Essiggurken", "Sandwich", "Roggenbrot"
      ]);

      const restParts = rest.split(/\s+/);
      const firstWord = restParts[0];
      let unit = "";
      let name = rest;

      if (/^(g|kg|ml|l|TL|EL|Prise|cm|mm|mL|cl|oz|cup|cups)$/i.test(firstWord)) {
        unit = firstWord;
        name = restParts.slice(1).join(" ");
      } else if (countUnits.has(firstWord)) {
        unit = "Stück";
        name = rest;
      } else if (restParts.length === 1) {
        unit = "Stück";
        name = rest;
      }

      const normalizedName = normalizeIngredientName(name);

      return {
        quantity,
        unit,
        name: name.trim(),
        key: `${normalizedName}|${unit.toLowerCase()}`
      };
    }

    function formatAmount(value) {
      const rounded = Math.round(value * 100) / 100;
      if (Number.isInteger(rounded)) {
        return String(rounded);
      }
      return String(rounded).replace(/\.0+$/, "").replace(/(\.\d*[1-9])0+$/, "$1");
    }

    function mergeIngredients(rows) {
      const grouped = new Map();

      rows.forEach(({ row }) => {
        const ingredientCell = row[2] || "";
        ingredientCell
          .split(/<br\s*\/?>/i)
          .map((part) => part.trim())
          .filter(Boolean)
          .forEach((line) => {
            const parsed = parseIngredientLine(line);
            const existing = grouped.get(parsed.key);
            if (!existing) {
              grouped.set(parsed.key, { ...parsed, quantity: parsed.quantity || null, recipes: new Set() });
              return;
            }

            existing.recipes = existing.recipes || new Set();
            if (parsed.quantity !== null && existing.quantity !== null && parsed.unit === existing.unit) {
              existing.quantity += parsed.quantity;
            } else if (existing.quantity === null && parsed.quantity !== null) {
              existing.quantity = parsed.quantity;
            }
          });
      });

      return Array.from(grouped.values()).map((item) => {
        const quantity = item.quantity === null ? "" : `${formatAmount(item.quantity)} `;
        const unit = item.unit ? `${item.unit} ` : "";
        return `${quantity}${unit}${item.name}`.trim();
      }).sort((a, b) => a.localeCompare(b, "de"));
    }

    function getSelectedRecipeEntries() {
      return Object.entries(cartState)
        .filter(([, active]) => active)
        .map(([rowIndex]) => {
          const index = Number(rowIndex);
          const row = allRows[index];
          return row ? { row, rowIndex: index } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.rowIndex - b.rowIndex);
    }

    function setSummaryVisibility(visible) {
      isSummaryOpen = visible;
      summaryPanel.hidden = !visible;
      summaryButton.dataset.active = visible ? "true" : "false";
      summaryButton.setAttribute("aria-expanded", visible ? "true" : "false");
      if (visible) {
        renderSummary();
      }
    }

    function renderSummary() {
      const selected = getSelectedRecipeEntries();
      summaryCount.hidden = selected.length === 0;
      summaryCount.textContent = String(selected.length);
      summaryMeta.textContent = `${selected.length} Rezept${selected.length === 1 ? "" : "e"} im Warenkorb`;

      if (selected.length === 0) {
        summaryContent.innerHTML = '<p class="summary-empty">Noch keine Rezepte im Warenkorb. Klick den Warenkorb neben einem Rezept an, um Zutaten zu sammeln.</p>';
        return;
      }

      if (isCombineAll) {
        const merged = mergeIngredients(selected);
        const section = document.createElement("section");
        section.className = "summary-card";
        section.innerHTML = `
          <h3>Zusammengefasste Einkaufsliste</h3>
          <ul class="summary-aggregate">
            ${merged.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        `;
        summaryContent.innerHTML = "";
        summaryContent.appendChild(section);
        return;
      }

      summaryContent.innerHTML = "";
      selected.forEach(({ row }) => {
        const section = document.createElement("section");
        section.className = "summary-card";
        section.innerHTML = `<h3>${row[0]}</h3>`;
        summaryContent.appendChild(section);
      });
    }

    function renderTable(headers, rowEntries) {
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";

      const headerRow = document.createElement("tr");
      const indexTh = document.createElement("th");
      indexTh.textContent = "#";
      headerRow.appendChild(indexTh);

      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      rowEntries.forEach(({ row, rowIndex }) => {
        const tr = document.createElement("tr");

        const indexTd = document.createElement("td");
        indexTd.textContent = String(rowIndex + 1);
        tr.appendChild(indexTd);

        row.forEach((cell, cellIndex) => {
          const td = document.createElement("td");
          const link = extractCellLink(cell);
          if (cellIndex === 1 && link) {
            const wrapper = document.createElement("div");
            wrapper.className = "recipe-actions";

            const a = document.createElement("a");
            a.href = link.href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.className = "recipe-text-link";
            a.setAttribute("aria-label", `Rezept öffnen: ${row[0]}`);
            a.setAttribute("title", `Rezept öffnen: ${row[0]}`);
            a.innerHTML = '<i data-lucide="link-2" aria-hidden="true"></i><span>Zum Rezept</span>';

            const cartButton = document.createElement("button");
            cartButton.type = "button";
            cartButton.className = "cart-toggle";
            cartButton.dataset.active = isInCart(rowIndex) ? "true" : "false";
            cartButton.dataset.rowIndex = String(rowIndex);
            cartButton.setAttribute("aria-label", isInCart(rowIndex) ? `Aus Warenkorb entfernen: ${row[0]}` : `Zum Warenkorb hinzufügen: ${row[0]}`);
            cartButton.setAttribute("title", isInCart(rowIndex) ? `Aus Warenkorb entfernen: ${row[0]}` : `Zum Warenkorb hinzufügen: ${row[0]}`);
            cartButton.innerHTML = isInCart(rowIndex)
              ? '<i data-lucide="shopping-cart" aria-hidden="true"></i><span class="sr-only">Im Warenkorb</span>'
              : '<i data-lucide="shopping-cart" aria-hidden="true"></i><span class="sr-only">Zum Warenkorb hinzufügen</span>';

            wrapper.appendChild(a);
            wrapper.appendChild(cartButton);
            td.appendChild(wrapper);
          } else {
            td.innerHTML = cell;
          }
          tr.appendChild(td);
        });

        tableBody.appendChild(tr);
      });

      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    function renderCurrentTable() {
      const rowEntries = (isFiltered ? selectedRowIndexes : allRows.map((_, index) => index))
        .map((rowIndex) => ({ row: allRows[rowIndex], rowIndex }));

      renderTable(allHeaders, rowEntries);
      statusEl.textContent = isFiltered
        ? ``
        : ``;
    }

    function pickRandomNumbers(count, max) {
      const pool = Array.from({ length: max }, (_, index) => index);
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(count, pool.length));
    }

    function getSelectionPool() {
      if (cardToggle.checked) {
        const start = Math.min(WARM_COLD_START_INDEX, allRows.length);
        const end = Math.min(WARM_COLD_END_INDEX, allRows.length);
        return Array.from({ length: Math.max(0, end - start) }, (_, index) => start + index);
      }

      return Array.from({ length: allRows.length }, (_, index) => index);
    }

    function renderRandomRows(indices) {
      randomRowsEl.innerHTML = "";
      indices.forEach((index, position) => {
        const span = document.createElement("span");
        span.textContent = String(index + 1);
        randomRowsEl.appendChild(span);
        if (position < indices.length - 1) {
          const comma = document.createElement("span");
          comma.textContent = ",";
          randomRowsEl.appendChild(comma);
        }
      });
    }

    function refreshSelection() {
      const pool = getSelectionPool();
      const picked = pickRandomNumbers(10, pool.length);
      selectedRowIndexes = picked.map((position) => pool[position]);
      renderRandomRows(selectedRowIndexes);
      renderCurrentTable();
    }

    async function init() {
      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Markdown konnte nicht geladen werden (${response.status}).`);
        }

        const markdown = await response.text();
        const { headers, rows } = parseMarkdownTable(markdown);

        allHeaders = headers;
        allRows = rows;
        recipeRows = rows;
        refreshSelection();
        renderSummary();
      } catch (error) {
        statusEl.textContent = "Fehler beim Laden.";
        errorEl.hidden = false;
        errorEl.textContent = `${error.message}\n\nLege eine Markdown-Datei unter ${DEFAULT_SOURCE} ab oder übergib eine URL mit ?source=https://...`;
      }
    }

    filterToggle.addEventListener("change", () => {
      if (allRows.length === 0) {
        return;
      }

      isFiltered = filterToggle.checked;
      renderCurrentTable();
    });

    cardToggle.addEventListener("change", () => {
      if (allRows.length === 0) {
        return;
      }

      refreshSelection();
    });

    tableBody.addEventListener("click", (event) => {
      const button = event.target.closest(".cart-toggle");
      if (!button) {
        return;
      }

      const rowIndex = Number(button.dataset.rowIndex);
      if (Number.isNaN(rowIndex)) {
        return;
      }

      toggleCart(rowIndex);
    });

    summaryButton.addEventListener("click", () => {
      setSummaryVisibility(!isSummaryOpen);
    });

    summaryCloseButton.addEventListener("click", () => {
      setSummaryVisibility(false);
    });

    combineToggle.addEventListener("change", () => {
      isCombineAll = combineToggle.checked;
      renderSummary();
    });

    clearCartButton.addEventListener("click", () => {
      cartState = {};
      saveCartState();
      renderCurrentTable();
      renderSummary();
    });

    init();
  </script>
</body>
</html>
