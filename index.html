<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KARTE DES HAUSES</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --muted: #6b6b6b;
      --line: #000000;
      --success: #138a36;
      --panel-bg: #ffffff;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      padding: 32px 24px 40px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 18px;
      letter-spacing: 0.02em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: baseline;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.4;
    }

    .meta strong {
      font-weight: 700;
    }

    .random-row {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .random-row span {
      display: inline-block;
      padding: 2px 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .top-actions {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 42px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.65) inset;
    }

    .icon-button[data-active="true"] {
      background: #eaf8ee;
      border-color: var(--success);
      color: var(--success);
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.9;
    }

    #summaryButton {
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
      min-width: 0;
      min-height: 0;
      width: 28px;
      height: 28px;
      border-radius: 999px;
    }

    #summaryButton:hover,
    #summaryButton:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--success);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--fg);
      padding: 9px 14px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #f5f5f5;
    }

    button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      user-select: none;
    }

    .toggle input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #000;
    }

    .recipe-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      color: var(--fg);
      text-decoration: none;
      line-height: 1;
    }

    .recipe-link:hover {
      background: #f5f5f5;
    }

    .recipe-link svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.9;
    }

    .recipe-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .recipe-text-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 8px;
      border: 1px solid transparent;
      text-decoration: none;
      line-height: 1.2;
    }

    .recipe-text-link:hover,
    .recipe-text-link:focus-visible {
      border-color: var(--line);
      background: #f5f5f5;
    }

    .recipe-text-link svg {
      width: 15px;
      height: 15px;
      stroke-width: 1.9;
      flex: none;
    }

    .cart-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      color: var(--fg);
      padding: 0;
      border-radius: 999px;
      box-shadow: none;
    }

    .cart-toggle:hover,
    .cart-toggle:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .cart-toggle[data-active="true"] {
      background: #eaf8ee;
      color: var(--success);
    }

    .cart-toggle svg {
      width: 15px;
      height: 15px;
      stroke-width: 2;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .summary-panel {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-bg);
      padding: 16px;
      margin: 0 0 18px;
    }

    .summary-panel[hidden] {
      display: none;
    }

    .summary-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .summary-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .summary-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .summary-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 14px;
    }

    .summary-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .summary-toggle input {
      margin: 0;
      accent-color: var(--success);
    }

    .summary-portion {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .summary-portion input {
      width: 72px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 10px;
      font: inherit;
    }

    .summary-list {
      display: grid;
      gap: 12px;
    }

    .summary-card {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .summary-card:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .summary-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .summary-card ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.55;
    }

    .summary-ingredients {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .summary-ingredients li {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dotted rgba(0, 0, 0, 0.18);
      padding-bottom: 6px;
    }

    .summary-ingredients li[data-purchased="true"],
    .summary-ingredients li[data-excluded="true"],
    .summary-aggregate li[data-purchased="true"] {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .summary-ingredients-item {
      min-width: 0;
      flex: 1;
    }

    .summary-aggregate {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .summary-aggregate li {
      border-bottom: 1px dotted rgba(0, 0, 0, 0.18);
      padding-bottom: 6px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .summary-aggregate-item {
      min-width: 0;
      flex: 1;
    }

    .ingredient-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: none;
    }

    .ingredient-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      box-shadow: none;
    }

    .ingredient-action:hover,
    .ingredient-action:focus-visible {
      background: rgba(0, 0, 0, 0.06);
    }

    .ingredient-action[data-active="true"] {
      color: var(--success);
    }

    .ingredient-action[data-available="false"] {
      color: var(--muted);
    }

    .ingredient-action svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ingredient-main {
      flex: 1;
      min-width: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      font: inherit;
      line-height: inherit;
    }

    .ingredient-main:hover,
    .ingredient-main:focus-visible {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .summary-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      font-size: 13px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    tbody tr:hover {
      background: #f5f5f5;
    }

    a {
      color: var(--fg);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 0;
    }

    .error {
      color: #000;
      border: 1px solid var(--line);
      padding: 12px;
      margin-top: 16px;
      font-size: 13px;
    }

    code {
      font-family: inherit;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      body {
        padding: 20px 14px 28px;
      }

      h1 {
        font-size: 18px;
      }

      thead th,
      tbody td {
        padding-left: 8px;
        padding-right: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>KARTE DES HAUSES</h1>
    <div class="top-actions">
      <button id="summaryButton" class="icon-button" type="button" aria-label="Warenkorb öffnen" aria-expanded="false" title="Warenkorb öffnen">
        <i data-lucide="receipt-text" aria-hidden="true"></i>
        <span id="summaryCount" class="icon-badge" hidden>0</span>
      </button>
    </div>
    <div class="meta">
      <strong>Auswahl der Rezepte:</strong>
      <div id="randomRows" class="random-row"></div>
    </div>
    <div class="controls">
      <label class="toggle">
        <input id="filterToggle" type="checkbox" checked>
        Nur Auswahl anzeigen
      </label>
      <label class="toggle">
        <input id="cardToggle" type="checkbox" checked>
        Warme / kalte Speisen
      </label>
    </div>
    <section id="summaryPanel" class="summary-panel" hidden aria-label="Warenkorb">
      <div class="summary-header">
        <div>
          <h2 class="summary-title">Warenkorb</h2>
          <p id="summaryMeta" class="summary-subtitle"></p>
        </div>
        <button id="summaryCloseButton" class="icon-button" type="button" aria-label="Warenkorb schließen" title="Warenkorb schließen">
          <i data-lucide="x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="summary-tools">
        <label class="summary-toggle">
          <input id="combineToggle" type="checkbox">
          Alles zusammenfassen
        </label>
        <label id="portionScaleWrap" class="summary-portion" hidden>
          Portionen
          <input id="portionScale" type="number" min="1" step="1" value="1" inputmode="numeric">
        </label>
        <button id="clearCartButton" type="button">Alle entfernen</button>
      </div>
      <div id="summaryContent" class="summary-list"></div>
    </section>
    <div id="status" class="status"></div>
    <div id="error" class="error" hidden></div>
    <div class="table-wrap">
      <table aria-label="Markdown Tabelle">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script>
    const DEFAULT_SOURCE = "./data.md";
    const sourceUrl = new URLSearchParams(window.location.search).get("source") || DEFAULT_SOURCE;
    const CART_STORAGE_KEY = "recipe-cart-state-v1";

    const randomRowsEl = document.getElementById("randomRows");
    const filterToggle = document.getElementById("filterToggle");
    const cardToggle = document.getElementById("cardToggle");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");
    const summaryButton = document.getElementById("summaryButton");
    const summaryCount = document.getElementById("summaryCount");
    const summaryPanel = document.getElementById("summaryPanel");
    const summaryCloseButton = document.getElementById("summaryCloseButton");
    const summaryMeta = document.getElementById("summaryMeta");
    const summaryContent = document.getElementById("summaryContent");
    const combineToggle = document.getElementById("combineToggle");
    const portionScaleWrap = document.getElementById("portionScaleWrap");
    const portionScaleInput = document.getElementById("portionScale");
    const clearCartButton = document.getElementById("clearCartButton");

    const PORTION_SCALE_STORAGE_KEY = "recipe-cart-portion-scale-v1";
    const PURCHASED_STORAGE_KEY = "recipe-cart-purchased-v1";
    const EXCLUDED_STORAGE_KEY = "recipe-cart-excluded-v1";
    const REWE_SEARCH_BASE_URL = "https://www.rewe.de/suche/uebersicht?searchTerm=";
    const REWE_PROXY_BASE_URL = "https://r.jina.ai/http://www.rewe.de/suche/uebersicht?searchTerm=";
    let allHeaders = [];
    let allRows = [];
    let recipeRows = [];
    let selectedRowIndexes = [];
    let isFiltered = true;
    const WARM_COLD_START_INDEX = 6;
    const WARM_COLD_END_INDEX = 28;
    let cartState = loadCartState();
    let isSummaryOpen = false;
    let isCombineAll = false;
    let portionScale = loadPortionScale();
    let summaryRenderToken = 0;
    const reweAvailabilityCache = new Map();
    let purchasedState = loadBooleanMap(PURCHASED_STORAGE_KEY);
    let excludedState = loadBooleanMap(EXCLUDED_STORAGE_KEY);

    function splitMarkdownRow(line) {
      return line
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => cell.trim());
    }

    function isSeparatorRow(line) {
      return /^\s*\|?[:\- ]+\|[:\-\| ]+\s*$/.test(line) && line.includes("-");
    }

    function parseMarkdownTable(markdown) {
      const lines = markdown
        .split(/\r?\n/)
        .map((line) => line.trimEnd())
        .filter((line) => line.trim().length > 0);

      const tableStart = lines.findIndex((line, index) => {
        const next = lines[index + 1];
        return line.includes("|") && next && isSeparatorRow(next);
      });

      if (tableStart === -1) {
        throw new Error("Keine Markdown-Tabelle gefunden.");
      }

      const headers = splitMarkdownRow(lines[tableStart]);
      const rows = [];

      for (let i = tableStart + 2; i < lines.length; i += 1) {
        const line = lines[i];
        if (!line.includes("|")) break;
        rows.push(splitMarkdownRow(line));
      }

      return { headers, rows };
    }

    function extractCellLink(cell) {
      const markdownLink = cell.match(/\[([^\]]+)\]\(([^)]+)\)/);
      if (markdownLink) {
        return {
          text: markdownLink[1],
          href: markdownLink[2]
        };
      }

      const plainUrl = cell.match(/https?:\/\/[^\s)]+/);
      if (plainUrl) {
        return {
          text: cell,
          href: plainUrl[0]
        };
      }

      return null;
    }

    const INGREDIENT_ALIASES = new Map([
      ["eier", "ei"],
      ["ei", "ei"],
      ["eigelbe", "eigelb"],
      ["eigelb", "eigelb"],
      ["zehen knoblauch", "knoblauch"],
      ["zehe knoblauch", "knoblauch"],
      ["knoblauchzehe", "knoblauch"],
      ["knoblauchzehen", "knoblauch"],
      ["walnüsse", "walnuss"],
      ["walnusskerne", "walnuss"],
      ["mandeln", "mandel"],
      ["mandel", "mandel"],
      ["bananen", "banane"],
      ["banane", "banane"],
      ["blaubeeren", "blaubeere"],
      ["blaubeere", "blaubeere"],
      ["chia-samen", "chiasamen"],
      ["chiasamen", "chiasamen"],
      ["kirschtomaten", "kirschtomate"],
      ["kirschtomate", "kirschtomate"],
      ["cocktailtomaten", "kirschtomate"],
      ["cocktailtomate", "kirschtomate"],
      ["tomaten", "tomate"],
      ["tomate", "tomate"],
      ["zuckerschoten", "zuckerschote"],
      ["zuckerschote", "zuckerschote"],
      ["limetten", "limette"],
      ["limette", "limette"],
      ["zitronen", "zitrone"],
      ["zitrone", "zitrone"],
      ["karotten", "karotte"],
      ["karotte", "karotte"],
      ["süßkartoffeln", "süßkartoffel"],
      ["süßkartoffel", "süßkartoffel"],
      ["hähnchenbrustfilets", "hähnchenbrustfilet"],
      ["hähnchenbrustfilet", "hähnchenbrustfilet"],
      ["hähnchenbrust", "hähnchenbrustfilet"],
      ["romana salatherzen", "romana salatherz"],
      ["romana salatherz", "romana salatherz"],
      ["parmesankäse", "parmesan"],
      ["parmesan", "parmesan"],
      ["parmesan (gerieben)", "parmesan"],
      ["pecorinokäse", "pecorino"],
      ["pecorino", "pecorino"],
      ["fetakäse", "feta"],
      ["feta", "feta"],
      ["mozzarellakäse", "mozzarella"],
      ["mozzarella", "mozzarella"],
      ["cheddarkäse", "cheddar"],
      ["cheddar", "cheddar"],
      ["pitabrote", "pitabrot"],
      ["pitabrot", "pitabrot"],
      ["sardellenfilets", "sardellenfilet"],
      ["sardellenfilet", "sardellenfilet"],
      ["schlagsahne", "sahne"],
      ["sahne", "sahne"],
      ["haselnüsse", "haselnuss"],
      ["haselnuss", "haselnuss"],
      ["pinienkerne", "pinienkern"],
      ["pinienkern", "pinienkern"],
      ["butter (zum einfetten)", "butter"],
      ["ungesalzene butter", "butter"],
      ["butter", "butter"],
      ["rote zwiebel", "rote zwiebel"],
      ["zwiebel (rot)", "rote zwiebel"],
      ["rote paprika", "rote paprika"],
      ["paprika (rot)", "rote paprika"],
      ["gelbe paprika", "gelbe paprika"],
      ["paprika (gelb)", "gelbe paprika"],
      ["zwiebeln", "zwiebel"],
      ["zwiebel", "zwiebel"],
      ["spinat (gefroren)", "spinat"],
      ["brötchen (vom vortag)", "brötchen"],
      ["olivenöl (zum bestreuen)", "olivenöl"],
      ["limette (abrieb und saft)", "limette"],
      ["stangen", "stange"],
      ["stange", "stange"],
      ["blätter", "blatt"],
      ["blatt", "blatt"],
      ["zweige", "zweig"],
      ["zweig", "zweig"],
      ["scheiben", "scheibe"],
      ["scheibe", "scheibe"]
    ]);

    function normalizeIngredientName(name) {
      const cleaned = name
        .replace(/\s*\(.*?\)\s*/g, " ")
        .replace(/\b(zum servieren|zum garnieren|zum bestäuben|zum anbraten|optional)\b/gi, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();

      if (/\brote?\s+zwiebel\b|\bzwiebel\s+rot\b/.test(cleaned)) {
        return "rote zwiebel";
      }
      if (/\brote?\s+paprika\b|\bpaprika\s+rot\b|\bgegrillte paprika\b/.test(cleaned)) {
        return "rote paprika";
      }
      if (/\bgelbe?\s+paprika\b|\bpaprika\s+gelb\b/.test(cleaned)) {
        return "gelbe paprika";
      }
      if (/\bbutter\b/.test(cleaned)) {
        return "butter";
      }
      if (/\bspinat\s+gefroren\b/.test(cleaned)) {
        return "spinat";
      }
      if (/\bbrötchen\s+vom vortag\b/.test(cleaned)) {
        return "brötchen";
      }
      if (/\blimette\s+abrieb und saft\b/.test(cleaned)) {
        return "limette";
      }
      if (/\bcocktailtomate\b|\bkirschtomate\b/.test(cleaned)) {
        return "kirschtomate";
      }
      if (/\bhähnchenbrust\b/.test(cleaned)) {
        return "hähnchenbrustfilet";
      }

      if (INGREDIENT_ALIASES.has(cleaned)) {
        return INGREDIENT_ALIASES.get(cleaned);
      }

      return cleaned
        .replace(/^zehen\s+knoblauch$/, "knoblauch")
        .replace(/^zehe\s+knoblauch$/, "knoblauch")
        .replace(/\s+käse$/, "")
        .replace(/\s+filets$/, "")
        .replace(/\s+kerne$/, "")
        .replace(/\s+eier$/, "")
        .replace(/\s+limetten$/, "")
        .replace(/\s+zitronen$/, "")
        .replace(/\s+tomaten$/, "")
        .replace(/\s+beeren$/, "")
        .replace(/\s+brote$/, "")
        .replace(/\s+scheiben$/, " scheibe")
        .replace(/\s+zweige$/, " zweig")
        .replace(/\s+stangen$/, " stange");
    }

    function getStoredCart() {
      try {
        const raw = localStorage.getItem(CART_STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (error) {
        return {};
      }
    }

    function loadCartState() {
      return getStoredCart();
    }

    function saveCartState() {
      localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cartState));
    }

    function loadPortionScale() {
      try {
        const raw = localStorage.getItem(PORTION_SCALE_STORAGE_KEY);
        const parsed = Number.parseInt(raw || "1", 10);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : 1;
      } catch (error) {
        return 1;
      }
    }

    function savePortionScale() {
      localStorage.setItem(PORTION_SCALE_STORAGE_KEY, String(portionScale));
    }

    function loadBooleanMap(storageKey) {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) {
          return {};
        }

        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (error) {
        return {};
      }
    }

    function saveBooleanMap(storageKey, value) {
      localStorage.setItem(storageKey, JSON.stringify(value));
    }

    function isPurchased(key) {
      return Boolean(purchasedState[key]);
    }

    function setPurchased(key, active) {
      if (active) {
        purchasedState[key] = true;
      } else {
        delete purchasedState[key];
      }
      saveBooleanMap(PURCHASED_STORAGE_KEY, purchasedState);
    }

    function togglePurchased(key) {
      setPurchased(key, !isPurchased(key));
    }

    function isExcluded(key) {
      return Boolean(excludedState[key]);
    }

    function setExcluded(key, active) {
      if (active) {
        excludedState[key] = true;
      } else {
        delete excludedState[key];
      }
      saveBooleanMap(EXCLUDED_STORAGE_KEY, excludedState);
    }

    function toggleExcluded(key) {
      setExcluded(key, !isExcluded(key));
    }

    function getRecipeKey(rowIndex) {
      return String(rowIndex);
    }

    function isInCart(rowIndex) {
      return Boolean(cartState[getRecipeKey(rowIndex)]);
    }

    function setCartState(rowIndex, active) {
      const key = getRecipeKey(rowIndex);
      if (active) {
        cartState[key] = true;
      } else {
        delete cartState[key];
      }
      saveCartState();
      renderCurrentTable();
      renderSummary();
    }

    function toggleCart(rowIndex) {
      setCartState(rowIndex, !isInCart(rowIndex));
    }

    function setIngredientPurchasedFromKey(key, active) {
      setPurchased(key, active);
      if (isSummaryOpen) {
        renderSummary();
      }
    }

    function setIngredientExcludedFromKey(key, active) {
      setExcluded(key, active);
      if (isSummaryOpen) {
        renderSummary();
      }
    }

    function openReweSearchForItem(itemName) {
      window.open(`${REWE_SEARCH_BASE_URL}${encodeURIComponent(itemName)}`, "_blank", "noopener,noreferrer");
    }

    function parseFractionToken(token) {
      const FRACTIONS = {
        "1/2": 0.5,
        "1/4": 0.25,
        "3/4": 0.75,
        "1/3": 1 / 3,
        "2/3": 2 / 3,
        "1/8": 0.125,
        "3/8": 0.375,
        "5/8": 0.625,
        "7/8": 0.875
      };

      if (FRACTIONS[token] !== undefined) {
        return FRACTIONS[token];
      }

      if (/^\d+(?:\.\d+)?$/.test(token)) {
        return Number(token);
      }

      return null;
    }

    function parseIngredientLine(line) {
      const cleanLine = line.replace(/\s+\(zum Servieren\)|\s+\(optional\)|\s+\(zum Garnieren\)|\s+\(zum Anbraten\)|\s+\(zum Bestäuben\)/gi, "").trim();
      const match = cleanLine.match(/^((?:\d+\s+)?(?:\d+\/\d+|\d+(?:\.\d+)?)|[¼½¾⅓⅔⅛⅜⅝⅞])\s+(.+)$/);
      if (!match) {
        return {
          quantity: null,
          unit: "",
          name: cleanLine,
          key: cleanLine.toLowerCase()
        };
      }

      const rawQuantity = match[1].trim();
      const rest = match[2].trim();
      const quantityParts = rawQuantity.split(/\s+/);
      let quantity = 0;
      quantityParts.forEach((part) => {
        const parsed = parseFractionToken(part);
        if (parsed !== null) {
          quantity += parsed;
        }
      });

      if (!quantity) {
        quantity = parseFractionToken(rawQuantity);
      }

      const countUnits = new Set([
        "Ei", "Eier", "Zehe", "Zehen", "Zwiebel", "Zwiebeln", "Banane", "Bananen", "Birne", "Birnen",
        "Tomate", "Tomaten", "Kiwi", "Kiwis", "Avocado", "Avocados", "Limette", "Limetten",
        "Zitrone", "Zitronen", "Karotte", "Karotten", "Kartoffel", "Kartoffeln", "Scheibe", "Scheiben",
        "Stange", "Stangen", "Zweig", "Zweige", "Blatt", "Blätter", "Stück", "Stueck", "Dose", "Dosen",
        "Packung", "Packungen", "Handvoll", "Brötchen", "Brötchen", "Paprika", "Pitabrote", "Würstchen",
        "Wiener", "Hähnchenbrustfilets", "Tortellini", "Gnocchi", "Hot-Dog-Brötchen", "Süßkartoffeln",
        "Karotten", "Rote Bete", "Zucchini", "Kichererbsen", "Essiggurken", "Sandwich", "Roggenbrot"
      ]);

      const restParts = rest.split(/\s+/);
      const firstWord = restParts[0];
      let unit = "";
      let name = rest;

      if (/^(g|kg|ml|l|TL|EL|Prise|cm|mm|mL|cl|oz|cup|cups)$/i.test(firstWord)) {
        unit = firstWord;
        name = restParts.slice(1).join(" ");
      } else if (countUnits.has(firstWord)) {
        unit = "Stück";
        name = rest;
      } else if (restParts.length === 1) {
        unit = "Stück";
        name = rest;
      }

      const normalizedName = normalizeIngredientName(name);

      return {
        quantity,
        unit,
        name: name.trim(),
        key: `${normalizedName}|${unit.toLowerCase()}`
      };
    }

    function formatAmount(value) {
      const rounded = Math.round(value * 100) / 100;
      if (Number.isInteger(rounded)) {
        return String(rounded);
      }
      return String(rounded).replace(/\.0+$/, "").replace(/(\.\d*[1-9])0+$/, "$1");
    }

    function shouldRoundQuantity(unit) {
      return ["g", "kg", "Stück"].includes(unit);
    }

    function formatIngredientLabel(item, scale = 1) {
      const amount = item.quantity === null ? null : item.quantity * scale;
      const quantity = amount === null
        ? ""
        : `${shouldRoundQuantity(item.unit) ? String(Math.round(amount)) : formatAmount(amount)} `;
      const unit = item.unit ? `${item.unit} ` : "";
      return `${quantity}${unit}${item.name}`.trim();
    }

    function getIngredientsForRow(row, rowIndex, scale = 1) {
      const ingredientCell = row[2] || "";
      return ingredientCell
        .split(/<br\s*\/?>/i)
        .map((part) => part.trim())
        .filter(Boolean)
        .map((line, ingredientIndex) => {
          const parsed = parseIngredientLine(line);
          return {
            ...parsed,
            rowIndex,
            ingredientIndex,
            instanceKey: `${rowIndex}|${ingredientIndex}|${parsed.key}`,
            globalKey: parsed.key,
            label: formatIngredientLabel(parsed, scale)
          };
        });
    }

    function mergeIngredientDetails(rows, scale = 1) {
      const grouped = new Map();

      rows.forEach(({ row, rowIndex }) => {
        getIngredientsForRow(row, rowIndex).forEach((parsed) => {
          if (isExcluded(parsed.instanceKey)) {
            return;
          }

          const existing = grouped.get(parsed.key);
          if (!existing) {
            grouped.set(parsed.key, { ...parsed, quantity: parsed.quantity || null, recipes: new Set() });
            return;
          }

          existing.recipes = existing.recipes || new Set();
          if (parsed.quantity !== null && existing.quantity !== null && parsed.unit === existing.unit) {
            existing.quantity += parsed.quantity;
          } else if (existing.quantity === null && parsed.quantity !== null) {
            existing.quantity = parsed.quantity;
          }
        });
      });

      return Array.from(grouped.values()).map((item) => ({
        ...item,
        label: formatIngredientLabel(item, scale)
      })).sort((a, b) => a.label.localeCompare(b.label, "de"));
    }

    function mergeIngredients(rows, scale = 1) {
      return mergeIngredientDetails(rows, scale).map((item) => item.label);
    }

    function createIconMarkup(name) {
      if (name === "truck") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 7h11v10H3z"></path>
            <path d="M14 10h3l3 3v4h-6z"></path>
            <circle cx="7" cy="18" r="1.5"></circle>
            <circle cx="18" cy="18" r="1.5"></circle>
          </svg>
        `;
      }

      if (name === "question-circle") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M9.5 9.3a3 3 0 1 1 4.9 2.3c-.9.7-1.9 1.2-1.9 2.4"></path>
            <path d="M12 17h.01"></path>
          </svg>
        `;
      }

      if (name === "trash-2") {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M6 6l1 14h10l1-14"></path>
            <path d="M10 11v5"></path>
            <path d="M14 11v5"></path>
          </svg>
        `;
      }

      return "";
    }

    function buildReweSearchTerms(item) {
      const term = item.name.trim();
      const terms = [term];
      if (!/^ja!/i.test(term)) {
        terms.push(`JA! ${term}`);
      }
      return terms;
    }

    async function checkReweAvailability(item) {
      const cacheKey = item.key;
      if (reweAvailabilityCache.has(cacheKey)) {
        return reweAvailabilityCache.get(cacheKey);
      }

      const terms = buildReweSearchTerms(item);
      for (const term of terms) {
        const urls = [
          `${REWE_SEARCH_BASE_URL}${encodeURIComponent(term)}`,
          `${REWE_PROXY_BASE_URL}${encodeURIComponent(term)}`
        ];

        for (const url of urls) {
          try {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) {
              continue;
            }

            const text = await response.text();
            if (!/Das haben wir nicht gefunden/i.test(text)) {
              reweAvailabilityCache.set(cacheKey, true);
              return true;
            }
          } catch (error) {
            // Try the next URL/term.
          }
        }
      }

      reweAvailabilityCache.set(cacheKey, false);
      return false;
    }

    async function refreshReweButtons(card, items, token) {
      const buttons = Array.from(card.querySelectorAll('.ingredient-action[data-action="rewe"]'));
      await Promise.all(items.map(async (item, index) => {
        const button = buttons[index];
        if (!button) {
          return;
        }

        const available = await checkReweAvailability(item);
        if (token !== summaryRenderToken || !button.isConnected) {
          return;
        }

        button.dataset.active = available ? "true" : "false";
        button.dataset.available = available ? "true" : "false";
        button.innerHTML = createIconMarkup(available ? "truck" : "question-circle");
      }));
    }

    function getSelectedRecipeEntries() {
      return Object.entries(cartState)
        .filter(([, active]) => active)
        .map(([rowIndex]) => {
          const index = Number(rowIndex);
          const row = allRows[index];
          return row ? { row, rowIndex: index } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.rowIndex - b.rowIndex);
    }

    function setSummaryVisibility(visible) {
      isSummaryOpen = visible;
      summaryPanel.hidden = !visible;
      summaryButton.dataset.active = visible ? "true" : "false";
      summaryButton.setAttribute("aria-expanded", visible ? "true" : "false");
      if (portionScaleInput.value !== String(portionScale)) {
        portionScaleInput.value = String(portionScale);
      }
      if (visible) {
        renderSummary();
      }
    }

    function renderSummary() {
      const renderToken = ++summaryRenderToken;
      const selected = getSelectedRecipeEntries();
      summaryCount.hidden = selected.length === 0;
      summaryCount.textContent = String(selected.length);
      summaryMeta.textContent = `${selected.length} Rezept${selected.length === 1 ? "" : "e"} im Warenkorb${isCombineAll && portionScale > 1 ? ` · ${portionScale}x hochgerechnet` : ""}`;
      portionScaleWrap.hidden = !isCombineAll;

      if (selected.length === 0) {
        summaryContent.innerHTML = '<p class="summary-empty">Noch keine Rezepte im Warenkorb. Klick den Warenkorb neben einem Rezept an, um Zutaten zu sammeln.</p>';
        return;
      }

      if (isCombineAll) {
        const merged = mergeIngredientDetails(selected, portionScale);
        const section = document.createElement("section");
        section.className = "summary-card";
        section.innerHTML = `
          <ul class="summary-aggregate">
            ${merged.map((item) => `
              <li data-purchased="${isPurchased(item.globalKey) ? "true" : "false"}">
                <button
                  type="button"
                  class="ingredient-main"
                  data-action="toggle-purchased"
                  data-global-key="${item.globalKey}"
                  aria-label="${item.label}"
                  title="${item.label}"
                >${item.label}</button>
                <span class="ingredient-actions">
                  <button
                    type="button"
                    class="ingredient-action"
                    data-action="rewe"
                    data-global-key="${item.globalKey}"
                    data-item-name="${item.name}"
                    data-available="unknown"
                    aria-label="Bei REWE suchen: ${item.label}"
                    title="Bei REWE suchen"
                  >${createIconMarkup("truck")}</button>
                </span>
              </li>
            `).join("")}
          </ul>
        `;
        summaryContent.innerHTML = "";
        summaryContent.appendChild(section);
        refreshReweButtons(section, merged, renderToken);
        return;
      }

      summaryContent.innerHTML = "";
      selected.forEach(({ row, rowIndex }) => {
        const items = getIngredientsForRow(row, rowIndex, 1);
        const section = document.createElement("section");
        section.className = "summary-card";
        section.innerHTML = `
          <h3>${row[0]}</h3>
          <ul class="summary-ingredients">
            ${items.map((item) => `
              <li data-purchased="${isPurchased(item.globalKey) ? "true" : "false"}" data-excluded="${isExcluded(item.instanceKey) ? "true" : "false"}">
                <button
                  type="button"
                  class="ingredient-main"
                  data-action="toggle-purchased"
                  data-global-key="${item.globalKey}"
                  data-instance-key="${item.instanceKey}"
                  aria-label="${item.label}"
                  title="${item.label}"
                >${item.label}</button>
                <span class="ingredient-actions">
                  <button
                    type="button"
                    class="ingredient-action"
                    data-action="rewe"
                    data-global-key="${item.globalKey}"
                    data-instance-key="${item.instanceKey}"
                    data-item-name="${item.name}"
                    data-available="unknown"
                    aria-label="Bei REWE suchen: ${item.label}"
                    title="Bei REWE suchen"
                  >${createIconMarkup("truck")}</button>
                  <button
                    type="button"
                    class="ingredient-action"
                    data-action="delete"
                    data-instance-key="${item.instanceKey}"
                    aria-label="${isExcluded(item.instanceKey) ? "Wieder einblenden" : "Ausblenden"}: ${item.label}"
                    title="${isExcluded(item.instanceKey) ? "Wieder einblenden" : "Ausblenden"}"
                    data-active="${isExcluded(item.instanceKey) ? "true" : "false"}"
                  >${createIconMarkup("trash-2")}</button>
                </span>
              </li>
            `).join("")}
          </ul>
        `;
        summaryContent.appendChild(section);
        refreshReweButtons(section, items, renderToken);
      });
    }

    function renderTable(headers, rowEntries) {
      tableHead.innerHTML = "";
      tableBody.innerHTML = "";

      const headerRow = document.createElement("tr");
      const indexTh = document.createElement("th");
      indexTh.textContent = "#";
      headerRow.appendChild(indexTh);

      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      rowEntries.forEach(({ row, rowIndex }) => {
        const tr = document.createElement("tr");

        const indexTd = document.createElement("td");
        indexTd.textContent = String(rowIndex + 1);
        tr.appendChild(indexTd);

        row.forEach((cell, cellIndex) => {
          const td = document.createElement("td");
          const link = extractCellLink(cell);
          if (cellIndex === 1 && link) {
            const wrapper = document.createElement("div");
            wrapper.className = "recipe-actions";

            const a = document.createElement("a");
            a.href = link.href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.className = "recipe-text-link";
            a.setAttribute("aria-label", `Rezept öffnen: ${row[0]}`);
            a.setAttribute("title", `Rezept öffnen: ${row[0]}`);
            a.innerHTML = '<i data-lucide="link-2" aria-hidden="true"></i><span>Zum Rezept</span>';

            const cartButton = document.createElement("button");
            cartButton.type = "button";
            cartButton.className = "cart-toggle";
            cartButton.dataset.active = isInCart(rowIndex) ? "true" : "false";
            cartButton.dataset.rowIndex = String(rowIndex);
            cartButton.setAttribute("aria-label", isInCart(rowIndex) ? `Aus Warenkorb entfernen: ${row[0]}` : `Zum Warenkorb hinzufügen: ${row[0]}`);
            cartButton.setAttribute("title", isInCart(rowIndex) ? `Aus Warenkorb entfernen: ${row[0]}` : `Zum Warenkorb hinzufügen: ${row[0]}`);
            cartButton.innerHTML = isInCart(rowIndex)
              ? '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="8" cy="21" r="1.5"></circle><circle cx="18" cy="21" r="1.5"></circle><path d="M2.5 3h2l2.2 12.2a2 2 0 0 0 2 1.6h8.5a2 2 0 0 0 2-1.5L21 7H6.2"></path></svg><span class="sr-only">Im Warenkorb</span>'
              : '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="8" cy="21" r="1.5"></circle><circle cx="18" cy="21" r="1.5"></circle><path d="M2.5 3h2l2.2 12.2a2 2 0 0 0 2 1.6h8.5a2 2 0 0 0 2-1.5L21 7H6.2"></path></svg><span class="sr-only">Zum Warenkorb hinzufügen</span>';

            wrapper.appendChild(a);
            wrapper.appendChild(cartButton);
            td.appendChild(wrapper);
          } else {
            td.innerHTML = cell;
          }
          tr.appendChild(td);
        });

        tableBody.appendChild(tr);
      });

      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    function renderCurrentTable() {
      const rowEntries = (isFiltered ? selectedRowIndexes : allRows.map((_, index) => index))
        .map((rowIndex) => ({ row: allRows[rowIndex], rowIndex }));

      renderTable(allHeaders, rowEntries);
      statusEl.textContent = isFiltered
        ? ``
        : ``;
    }

    function pickRandomNumbers(count, max) {
      const pool = Array.from({ length: max }, (_, index) => index);
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(count, pool.length));
    }

    function getSelectionPool() {
      if (cardToggle.checked) {
        const start = Math.min(WARM_COLD_START_INDEX, allRows.length);
        const end = Math.min(WARM_COLD_END_INDEX, allRows.length);
        return Array.from({ length: Math.max(0, end - start) }, (_, index) => start + index);
      }

      return Array.from({ length: allRows.length }, (_, index) => index);
    }

    function renderRandomRows(indices) {
      randomRowsEl.innerHTML = "";
      indices.forEach((index, position) => {
        const span = document.createElement("span");
        span.textContent = String(index + 1);
        randomRowsEl.appendChild(span);
        if (position < indices.length - 1) {
          const comma = document.createElement("span");
          comma.textContent = ",";
          randomRowsEl.appendChild(comma);
        }
      });
    }

    function refreshSelection() {
      const pool = getSelectionPool();
      const picked = pickRandomNumbers(10, pool.length);
      selectedRowIndexes = picked.map((position) => pool[position]);
      renderRandomRows(selectedRowIndexes);
      renderCurrentTable();
    }

    async function init() {
      try {
        const response = await fetch(sourceUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Markdown konnte nicht geladen werden (${response.status}).`);
        }

        const markdown = await response.text();
        const { headers, rows } = parseMarkdownTable(markdown);

        allHeaders = headers;
        allRows = rows;
        recipeRows = rows;
        refreshSelection();
        renderSummary();
      } catch (error) {
        statusEl.textContent = "Fehler beim Laden.";
        errorEl.hidden = false;
        errorEl.textContent = `${error.message}\n\nLege eine Markdown-Datei unter ${DEFAULT_SOURCE} ab oder übergib eine URL mit ?source=https://...`;
      }
    }

    filterToggle.addEventListener("change", () => {
      if (allRows.length === 0) {
        return;
      }

      isFiltered = filterToggle.checked;
      renderCurrentTable();
    });

    cardToggle.addEventListener("change", () => {
      if (allRows.length === 0) {
        return;
      }

      refreshSelection();
    });

    tableBody.addEventListener("click", (event) => {
      const button = event.target.closest(".cart-toggle");
      if (!button) {
        return;
      }

      const rowIndex = Number(button.dataset.rowIndex);
      if (Number.isNaN(rowIndex)) {
        return;
      }

      toggleCart(rowIndex);
    });

    summaryContent.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-action]");
      const mainButton = event.target.closest(".ingredient-main");
      if (!actionButton && !mainButton) {
        return;
      }

      const button = actionButton || mainButton;
      const action = button.dataset.action || "toggle-purchased";

      if (action === "toggle-purchased") {
        const globalKey = button.dataset.globalKey;
        if (!globalKey) {
          return;
        }

        setIngredientPurchasedFromKey(globalKey, !isPurchased(globalKey));
        return;
      }

      if (action === "rewe") {
        const globalKey = button.dataset.globalKey;
        if (!globalKey) {
          return;
        }

        const itemName = button.dataset.itemName || button.getAttribute("aria-label")?.replace(/^Bei REWE suchen:\s*/i, "") || "";
        openReweSearchForItem(itemName);
        setIngredientPurchasedFromKey(globalKey, !isPurchased(globalKey));
        return;
      }

      if (action === "delete") {
        const instanceKey = button.dataset.instanceKey;
        if (!instanceKey) {
          return;
        }

        setIngredientExcludedFromKey(instanceKey, !isExcluded(instanceKey));
      }
    });

    summaryButton.addEventListener("click", () => {
      setSummaryVisibility(!isSummaryOpen);
    });

    summaryCloseButton.addEventListener("click", () => {
      setSummaryVisibility(false);
    });

    combineToggle.addEventListener("change", () => {
      isCombineAll = combineToggle.checked;
      renderSummary();
    });

    portionScaleInput.addEventListener("change", () => {
      const parsed = Number.parseInt(portionScaleInput.value, 10);
      portionScale = Number.isFinite(parsed) && parsed > 0 ? parsed : 1;
      portionScaleInput.value = String(portionScale);
      savePortionScale();
      if (isSummaryOpen) {
        renderSummary();
      }
    });

    clearCartButton.addEventListener("click", () => {
      cartState = {};
      purchasedState = {};
      excludedState = {};
      saveCartState();
      saveBooleanMap(PURCHASED_STORAGE_KEY, purchasedState);

    });
